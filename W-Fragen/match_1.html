<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>W-Fragen — Match</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F4EF;--surface:#fff;--text:#1C1917;--muted:#78716C;--hint:#A8A29E;
  --c:#0F766E;--cl:#CCFBF1;--ct:#134E4A;--cb:#5EEAD4;
  --person:#185FA5;--personl:#E6F1FB;--persont:#0C447C;--personb:#B5D4F4;
  --sache:#D85A30;--sachel:#FAECE7;--sachet:#7C2D12;--sacheb:#FDBA74;
  --ort:#1D9E75;--ortl:#E1F5EE;--ortt:#0F6E56;--ortb:#9FE1CB;
  --zeit:#B45309;--zeitl:#FEF3C7;--zeitt:#92400E;--zeitb:#FDE68A;
  --grund:#BE185D;--grundl:#FCE7F3;--grundt:#831843;--grundb:#F9A8D4;
  --art:#7C3AED;--artl:#EDE9FE;--artt:#5B21B6;--artb:#C4B5FD;
  --green:#1D9E75;--greenl:#E1F5EE;--greent:#0F6E56;
  --red:#D85A30;--redl:#FAECE7;
  --border:rgba(28,25,23,0.1);--bm:rgba(28,25,23,0.15);
  --r:16px;--rs:12px;--sh:0 2px 12px rgba(28,25,23,0.07);--shc:0 4px 20px rgba(28,25,23,0.10)
}
html,body{min-height:100%;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);-webkit-font-smoothing:antialiased}
body{display:flex;flex-direction:column;align-items:center;padding-bottom:32px}
.hdr{width:100%;max-width:660px;padding:20px 20px 0;display:flex;justify-content:space-between;align-items:flex-start}
.title{font-family:'DM Serif Display',serif;font-size:clamp(18px,5vw,24px)}
.subtitle{font-size:12px;color:var(--muted);margin-top:3px}
.meta{text-align:right;font-size:12px;color:var(--muted)}
.prog-wrap{width:100%;max-width:660px;padding:10px 20px 0}
.prog-bar{height:4px;background:var(--border);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;background:var(--c);border-radius:4px;transition:width .4s}
.srow{width:100%;max-width:660px;padding:10px 20px 0;display:flex;gap:10px}
.sp{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:10px 8px;text-align:center;box-shadow:var(--sh)}
.sp-n{font-family:'DM Serif Display',serif;font-size:20px;line-height:1}
.sp-l{font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--hint);margin-top:3px}
/* Buckets — 3 columns, 2 rows */
.buckets-wrap{width:100%;max-width:660px;padding:10px 20px 0}
.buckets{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.bucket{border-radius:var(--rs);border:2px dashed;padding:10px 8px;min-height:68px;display:flex;flex-direction:column;align-items:center;gap:5px;transition:all .2s}
.bucket.dragover{transform:scale(1.04);box-shadow:var(--shc)}
.bt{font-size:10px;font-weight:600;letter-spacing:.7px;text-transform:uppercase;text-align:center}
.bt-ar{font-size:11px;direction:rtl;text-align:center;opacity:.7}
.bc{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;width:100%}
.pchip{font-family:'DM Serif Display',serif;font-size:14px;font-weight:400;padding:3px 9px;border-radius:20px;white-space:nowrap}
.pchip.ok{background:rgba(255,255,255,.75)}
.pchip.fail{text-decoration:line-through;opacity:.5}
/* Pool */
.pool-lbl{width:100%;max-width:660px;padding:12px 20px 4px;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--hint)}
.pool{width:100%;max-width:660px;padding:0 20px;display:flex;flex-wrap:wrap;gap:8px;justify-content:center;min-height:48px}
.chip{background:var(--surface);border:1.5px solid var(--bm);border-radius:20px;padding:8px 16px;font-family:'DM Serif Display',serif;font-size:17px;font-weight:400;color:var(--text);cursor:grab;user-select:none;box-shadow:var(--sh);transition:transform .15s,box-shadow .15s;-webkit-tap-highlight-color:transparent}
.chip:active{cursor:grabbing;transform:scale(1.06);box-shadow:var(--shc)}
.chip.dragging{opacity:.4}
.chip.selected{background:var(--text);color:var(--bg);border-color:var(--text);transform:scale(1.06)}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);padding:10px 20px;border-radius:20px;font-size:14px;font-weight:600;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;z-index:100}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{background:var(--greenl);color:var(--greent);border:1px solid var(--green)}
.toast.fail{background:var(--redl);color:var(--red);border:1px solid var(--red)}
.done{width:100%;max-width:660px;padding:40px 20px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:12px}
.done h2{font-family:'DM Serif Display',serif;font-size:28px}
.dgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;margin-top:8px}
.dg{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:14px 8px;text-align:center;box-shadow:var(--sh)}
.dg-n{font-family:'DM Serif Display',serif;font-size:26px;line-height:1}
.dg-l{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--hint);margin-top:4px}
.restart{padding:13px 32px;border-radius:var(--rs);background:var(--text);color:var(--bg);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;border:none;cursor:pointer;margin-top:4px}
.footer{padding:20px 0 8px;font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--hint);text-align:center;width:100%}
</style>
</head>
<body>
<div class="hdr">
  <div><div class="title">W-Fragen Match</div><div class="subtitle">Ziehe jedes Fragewort in die richtige Kategorie</div></div>
  <div class="meta" id="meta">Runde 1 / 4</div>
</div>
<div class="prog-wrap"><div class="prog-bar"><div class="prog-fill" id="prog" style="width:0%"></div></div></div>
<div class="srow">
  <div class="sp"><div class="sp-n" id="sc-ok" style="color:var(--green)">0</div><div class="sp-l">Richtig</div></div>
  <div class="sp"><div class="sp-n" id="sc-no" style="color:var(--red)">0</div><div class="sp-l">Falsch</div></div>
  <div class="sp"><div class="sp-n" id="sc-pt" style="color:var(--ct)">0</div><div class="sp-l">Punkte</div></div>
</div>
<!-- Buckets -->
<div class="buckets-wrap">
  <div class="buckets" id="buckets">
    <div class="bucket" id="b-person" style="border-color:var(--personb);background:var(--personl)" ondragover="dov(event)" ondrop="drop(event,'person')" onclick="tapBucket('person')">
      <div class="bt" style="color:var(--persont)">Person<br><span style="font-size:9px;opacity:.7">من؟ / لمن؟</span></div>
      <div class="bc" id="bc-person"></div>
    </div>
    <div class="bucket" id="b-sache" style="border-color:var(--sacheb);background:var(--sachel)" ondragover="dov(event)" ondrop="drop(event,'sache')" onclick="tapBucket('sache')">
      <div class="bt" style="color:var(--sachet)">Sache / Ding<br><span style="font-size:9px;opacity:.7">ما؟ / أيّ؟</span></div>
      <div class="bc" id="bc-sache"></div>
    </div>
    <div class="bucket" id="b-ort" style="border-color:var(--ortb);background:var(--ortl)" ondragover="dov(event)" ondrop="drop(event,'ort')" onclick="tapBucket('ort')">
      <div class="bt" style="color:var(--ortt)">Ort<br><span style="font-size:9px;opacity:.7">أين؟ / إلى أين؟</span></div>
      <div class="bc" id="bc-ort"></div>
    </div>
    <div class="bucket" id="b-zeit" style="border-color:var(--zeitb);background:var(--zeitl)" ondragover="dov(event)" ondrop="drop(event,'zeit')" onclick="tapBucket('zeit')">
      <div class="bt" style="color:var(--zeitt)">Zeit<br><span style="font-size:9px;opacity:.7">متى؟</span></div>
      <div class="bc" id="bc-zeit"></div>
    </div>
    <div class="bucket" id="b-grund" style="border-color:var(--grundb);background:var(--grundl)" ondragover="dov(event)" ondrop="drop(event,'grund')" onclick="tapBucket('grund')">
      <div class="bt" style="color:var(--grundt)">Grund<br><span style="font-size:9px;opacity:.7">لماذا؟</span></div>
      <div class="bc" id="bc-grund"></div>
    </div>
    <div class="bucket" id="b-art" style="border-color:var(--artb);background:var(--artl)" ondragover="dov(event)" ondrop="drop(event,'art')" onclick="tapBucket('art')">
      <div class="bt" style="color:var(--artt)">Art / Wie<br><span style="font-size:9px;opacity:.7">كيف؟</span></div>
      <div class="bc" id="bc-art"></div>
    </div>
  </div>
</div>
<div class="pool-lbl">Fragewörter zum Zuordnen:</div>
<div class="pool" id="pool"></div>
<div class="toast" id="toast"></div>
<div class="footer">by ❤️ Mostafa Toumi</div>

<script>
const ALL=[
  {w:"wer?",    cat:"person"},{w:"wen?",      cat:"person"},{w:"wem?",      cat:"person"},{w:"wessen?",  cat:"person"},
  {w:"was?",    cat:"sache"}, {w:"welch-?",   cat:"sache"},
  {w:"wo?",     cat:"ort"},   {w:"woher?",    cat:"ort"},   {w:"wohin?",    cat:"ort"},
  {w:"wann?",   cat:"zeit"},  {w:"seit wann?",cat:"zeit"},  {w:"bis wann?", cat:"zeit"},
  {w:"warum?",  cat:"grund"}, {w:"weshalb?",  cat:"grund"}, {w:"wieso?",    cat:"grund"},
  {w:"wie?",    cat:"art"},   {w:"wie viel?", cat:"art"},   {w:"wie viele?",cat:"art"},
  {w:"wie lange?",cat:"art"}, {w:"wie oft?",  cat:"art"},   {w:"wie weit?", cat:"art"},
];
const CATS=['person','sache','ort','zeit','grund','art'];
const CAT_COLORS={
  person:{b:'var(--personb)',bg:'var(--personl)',t:'var(--persont)'},
  sache: {b:'var(--sacheb)', bg:'var(--sachel)', t:'var(--sachet)'},
  ort:   {b:'var(--ortb)',   bg:'var(--ortl)',   t:'var(--ortt)'},
  zeit:  {b:'var(--zeitb)',  bg:'var(--zeitl)',  t:'var(--zeitt)'},
  grund: {b:'var(--grundb)', bg:'var(--grundl)', t:'var(--grundt)'},
  art:   {b:'var(--artb)',   bg:'var(--artl)',   t:'var(--artt)'},
};

// Split into 4 rounds of ~5-6 items each (mixed categories)
const PER=6;
let rounds=[],rIdx=0,correct=0,wrong=0,points=0,dragItem=null,selectedChip=null;

function shuffle(a){return[...a].sort(()=>Math.random()-.5)}

function init(){
  const sh=shuffle(ALL);
  rounds=[];
  for(let i=0;i<sh.length;i+=PER) rounds.push(sh.slice(i,i+PER));
  rIdx=0;correct=0;wrong=0;points=0;loadRound();
}

function loadRound(){
  if(rIdx>=rounds.length){showDone();return;}
  selectedChip=null;
  document.getElementById('meta').textContent='Runde '+(rIdx+1)+' / '+rounds.length;
  document.getElementById('prog').style.width=(rIdx/rounds.length*100)+'%';
  CATS.forEach(k=>{document.getElementById('bc-'+k).innerHTML='';});
  const pool=document.getElementById('pool');pool.innerHTML='';
  shuffle(rounds[rIdx]).forEach(item=>{
    const chip=document.createElement('div');
    chip.className='chip';chip.textContent=item.w;chip.dataset.w=item.w;chip.dataset.cat=item.cat;
    chip.draggable=true;
    chip.addEventListener('dragstart',e=>{dragItem=chip;chip.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
    chip.addEventListener('dragend',()=>{chip.classList.remove('dragging');dragItem=null;});
    chip.addEventListener('click',()=>selectChip(chip));
    pool.appendChild(chip);
  });
}

function selectChip(chip){
  if(selectedChip===chip){chip.classList.remove('selected');selectedChip=null;return;}
  if(selectedChip)selectedChip.classList.remove('selected');
  chip.classList.add('selected');selectedChip=chip;
}
function tapBucket(cat){if(!selectedChip)return;placeChip(selectedChip,cat);selectedChip=null;}
function dov(e){e.preventDefault();e.currentTarget.classList.add('dragover');}
function drop(e,cat){e.preventDefault();e.currentTarget.classList.remove('dragover');if(!dragItem)return;placeChip(dragItem,cat);}
document.querySelectorAll('.bucket').forEach(b=>b.addEventListener('dragleave',()=>b.classList.remove('dragover')));

function placeChip(chip,cat){
  const cc=chip.dataset.cat,w=chip.dataset.w;
  const ok=cat===cc;
  if(ok){correct++;points+=2;}else{wrong++;points=Math.max(0,points-1);}
  document.getElementById('sc-ok').textContent=correct;
  document.getElementById('sc-no').textContent=wrong;
  document.getElementById('sc-pt').textContent=points;
  const cs=CAT_COLORS[cat];
  const placed=document.createElement('span');
  placed.className='pchip '+(ok?'ok':'fail');
  placed.style.cssText=ok?`background:rgba(255,255,255,.75);color:${cs.t}`:`background:var(--redl);color:var(--red);`;
  placed.textContent=w+(ok?'':' ✗');
  document.getElementById('bc-'+cat).appendChild(placed);
  if(!ok){
    showToast('✗ '+w+' → '+cc,'fail');
    const hcs=CAT_COLORS[cc];
    const hint=document.createElement('span');
    hint.className='pchip ok';hint.textContent=w+' ✓';
    hint.style.cssText=`background:rgba(255,255,255,.6);color:${hcs.t};opacity:.4`;
    document.getElementById('bc-'+cc).appendChild(hint);
  } else {
    showToast('✓ '+w+' korrekt!','ok');
  }
  chip.remove();
  if(document.getElementById('pool').children.length===0){setTimeout(()=>{rIdx++;loadRound();},700);}
}

let toastTimer;
function showToast(msg,type){
  const t=document.getElementById('toast');clearTimeout(toastTimer);
  t.textContent=msg;t.className='toast show '+type;
  toastTimer=setTimeout(()=>t.classList.remove('show'),1300);
}

function showDone(){
  document.querySelector('.buckets-wrap').style.display='none';
  document.querySelector('.pool-lbl').style.display='none';
  document.getElementById('pool').style.display='none';
  document.getElementById('prog').style.width='100%';
  const total=correct+wrong,pct=Math.round(correct/total*100)||0;
  const d=document.createElement('div');d.className='done';
  d.innerHTML=`<div style="font-size:48px">${pct>=90?'🏆':pct>=70?'🎉':pct>=50?'💪':'📚'}</div>
  <h2>Fertig!</h2>
  <div style="font-family:'DM Serif Display',serif;font-size:56px;line-height:1">${pct}%</div>
  <div class="dgrid">
    <div class="dg"><div class="dg-n" style="color:var(--green)">${correct}</div><div class="dg-l">Richtig</div></div>
    <div class="dg"><div class="dg-n" style="color:var(--red)">${wrong}</div><div class="dg-l">Falsch</div></div>
    <div class="dg"><div class="dg-n" style="color:var(--ct)">${points}</div><div class="dg-l">Punkte</div></div>
  </div>
  <button class="restart" onclick="location.reload()">Nochmal ↺</button>`;
  document.querySelector('.footer').before(d);
}
init();
</script>
</body>
</html>
