<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>W-Fragen — Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F4EF;--surface:#fff;--text:#1C1917;--muted:#78716C;--hint:#A8A29E;
  --c:#0F766E;--cl:#CCFBF1;--ct:#134E4A;--cb:#5EEAD4;
  --green:#1D9E75;--greenl:#E1F5EE;--greent:#0F6E56;
  --red:#D85A30;--redl:#FAECE7;--redt:#993C1D;
  --amber:#B45309;--amberl:#FEF3C7;
  --border:rgba(28,25,23,0.1);--bm:rgba(28,25,23,0.15);
  --r:16px;--rs:12px;--sh:0 2px 12px rgba(28,25,23,0.07);--shc:0 8px 32px rgba(28,25,23,0.12)
}
html,body{min-height:100%;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);-webkit-font-smoothing:antialiased}
body{display:flex;flex-direction:column;align-items:center;padding-bottom:32px}
.hdr{width:100%;max-width:560px;padding:20px 20px 0}
.title{font-family:'DM Serif Display',serif;font-size:clamp(18px,5vw,24px)}
.subtitle{font-size:12px;color:var(--muted);margin-top:3px}
.prog-wrap{width:100%;max-width:560px;padding:12px 20px 0}
.prog-meta{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:6px}
.prog-bar{height:4px;background:var(--border);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;background:var(--c);border-radius:4px;transition:width .4s}
.scores{width:100%;max-width:560px;padding:10px 20px 0;display:flex;gap:10px}
.sc{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:10px 8px;text-align:center;box-shadow:var(--sh)}
.sc-n{font-family:'DM Serif Display',serif;font-size:22px;line-height:1}
.sc-l{font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--hint);margin-top:3px}
.qwrap{width:100%;max-width:560px;padding:12px 20px 0}
.qcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shc);padding:clamp(18px,5vw,26px) 22px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:8px;min-height:170px;justify-content:center;position:relative;overflow:hidden}
.qcard::after{content:'';position:absolute;inset:0;border-radius:var(--r);opacity:0;pointer-events:none}
.qcard.fok::after{background:var(--greenl);animation:fl .35s ease forwards}
.qcard.fno::after{background:var(--redl);animation:fl .35s ease forwards}
@keyframes fl{0%{opacity:.7}100%{opacity:0}}
.qcard.shake{animation:sk .4s cubic-bezier(.36,.07,.19,.97)}
@keyframes sk{10%,90%{transform:translateX(-3px)}20%,80%{transform:translateX(4px)}30%,50%,70%{transform:translateX(-5px)}40%,60%{transform:translateX(5px)}}
.q-label{font-size:10px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--hint)}
/* Sentence with blank */
.q-sentence{font-family:'DM Serif Display',serif;font-size:clamp(17px,4.5vw,24px);color:var(--text);line-height:1.5;display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:5px}
.q-blank{display:inline-block;min-width:80px;border-bottom:3px solid var(--c);text-align:center;font-size:clamp(17px,4.5vw,24px);padding:0 6px;color:var(--ct);transition:all .2s}
.q-blank.filled-ok{border-radius:6px;padding:2px 8px;background:var(--greenl);border-color:var(--green);color:var(--greent)}
.q-blank.filled-no{border-radius:6px;padding:2px 8px;background:var(--redl);border-color:var(--red);color:var(--redt)}
.q-ar{font-size:13px;color:var(--muted);direction:rtl}
.opts{width:100%;max-width:560px;padding:12px 20px 0;display:grid;grid-template-columns:1fr 1fr;gap:10px}
.opt{background:var(--surface);border:1.5px solid var(--bm);border-radius:var(--rs);padding:clamp(12px,3.5vw,16px) 10px;font-family:'DM Serif Display',serif;font-size:clamp(16px,4.5vw,22px);color:var(--text);cursor:pointer;text-align:center;transition:all .12s;box-shadow:var(--sh);-webkit-tap-highlight-color:transparent}
.opt:active:not([disabled]){transform:scale(.96)}
.opt.ok{background:var(--greenl);border-color:var(--green);color:var(--greent)}
.opt.no{background:var(--redl);border-color:var(--red);color:var(--redt)}
.opt.dim{opacity:.3}
.opt[disabled]{cursor:default}
.fbrow{width:100%;max-width:560px;padding:12px 20px 0;display:flex;align-items:center;justify-content:space-between;gap:12px;min-height:48px}
.fbmsg{font-size:14px;font-weight:500;color:var(--muted);flex:1;line-height:1.5}
.fbmsg.ok{color:var(--greent)}
.fbmsg.no{color:var(--redt)}
.nxt{padding:10px 22px;border-radius:var(--rs);background:var(--text);color:var(--bg);border:none;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;white-space:nowrap}
.done-scr{width:100%;max-width:560px;padding:40px 20px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:12px}
.done-scr h2{font-family:'DM Serif Display',serif;font-size:30px}
.dgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;margin-top:8px}
.dg{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:14px 8px;text-align:center;box-shadow:var(--sh)}
.dg-n{font-family:'DM Serif Display',serif;font-size:26px;line-height:1}
.dg-l{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--hint);margin-top:4px}
.restart{padding:13px 32px;border-radius:var(--rs);background:var(--text);color:var(--bg);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;border:none;cursor:pointer;margin-top:4px}
.footer{padding:20px 0 8px;font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--hint);text-align:center;width:100%}
</style>
</head>
<body>
<div class="hdr">
  <div class="title">W-Fragen Quiz</div>
  <div class="subtitle">Welches Fragewort passt in den Satz?</div>
</div>
<div class="prog-wrap">
  <div class="prog-meta"><span id="counter">Frage 1 / 40</span><span id="pct">0%</span></div>
  <div class="prog-bar"><div class="prog-fill" id="prog" style="width:0%"></div></div>
</div>
<div class="scores">
  <div class="sc"><div class="sc-n" id="sc-c" style="color:var(--green)">0</div><div class="sc-l">Richtig</div></div>
  <div class="sc"><div class="sc-n" id="sc-w" style="color:var(--red)">0</div><div class="sc-l">Falsch</div></div>
  <div class="sc"><div class="sc-n" id="sc-s" style="color:var(--amber)">0</div><div class="sc-l">Streak</div></div>
</div>
<div class="qwrap">
  <div class="qcard" id="qcard">
    <div class="q-label">Ergänze das Fragewort</div>
    <div class="q-sentence" id="qsentence"></div>
    <div class="q-ar" id="qar"></div>
  </div>
</div>
<div class="opts" id="opts"></div>
<div class="fbrow" id="fbrow"><div class="fbmsg" id="fbmsg"></div></div>
<div class="footer">by ❤️ Mostafa Toumi</div>
<script>
// {s: sentence parts (blank = empty string between parts), correct, opts (wrong choices), ar}
const QS=[
  {s:["___ bist du?"],correct:"Wer",ar:"من أنت؟",wrong:["Was","Wo","Wie"]},
  {s:["___ machst du?"],correct:"Was",ar:"ماذا تفعل؟",wrong:["Wer","Wo","Wann"]},
  {s:["___ wohnst du?"],correct:"Wo",ar:"أين تسكن؟",wrong:["Woher","Wann","Was"]},
  {s:["___ kommst du?"],correct:"Woher",ar:"من أين أنت؟",wrong:["Wo","Wohin","Wann"]},
  {s:["___ gehst du?"],correct:"Wohin",ar:"إلى أين تذهب؟",wrong:["Wo","Woher","Was"]},
  {s:["___ heißt du?"],correct:"Wie",ar:"ما اسمك؟",wrong:["Was","Wer","Wo"]},
  {s:["___ kommst du?"],correct:"Wann",ar:"متى ستأتي؟",wrong:["Wo","Wie","Was"]},
  {s:["___ lernst du Deutsch?"],correct:"Warum",ar:"لماذا تتعلم الألمانية؟",wrong:["Wann","Was","Wie"]},
  {s:["___ gibst du das Buch?"],correct:"Wem",ar:"لمن تعطي الكتاب؟",wrong:["Wen","Wer","Was"]},
  {s:["___ liebst du?"],correct:"Wen",ar:"من تحب؟",wrong:["Wer","Wem","Was"]},
  {s:["___ Buch ist das?"],correct:"Wessen",ar:"كتاب من هذا؟",wrong:["Wer","Welches","Was"]},
  {s:["___ Bus fährt zum Bahnhof?"],correct:"Welcher",ar:"أي حافلة تذهب إلى المحطة؟",wrong:["Was","Wer","Wie"]},
  {s:["___ alt bist du?"],correct:"Wie",ar:"كم عمرك؟",wrong:["Was","Wann","Wo"]},
  {s:["___ viel kostet das?"],correct:"Wie",ar:"كم يكلف؟",wrong:["Was","Wann","Wer"]},
  {s:["___ lange dauert der Film?"],correct:"Wie",ar:"كم يستغرق الفيلم؟",wrong:["Wann","Was","Wo"]},
  {s:["___ fährt der Zug ab?"],correct:"Wann",ar:"متى ينطلق القطار؟",wrong:["Wo","Wie","Was"]},
  {s:["___ lernst du schon Deutsch?"],correct:"Seit wann",ar:"منذ متى تتعلم الألمانية؟",wrong:["Wann","Bis wann","Wie lange"]},
  {s:["___ arbeitest du heute?"],correct:"Bis wann",ar:"حتى متى تعمل اليوم؟",wrong:["Wann","Seit wann","Wie lange"]},
  {s:["___ oft gehst du ins Kino?"],correct:"Wie",ar:"كم مرة تذهب إلى السينما؟",wrong:["Was","Wann","Wer"]},
  {s:["___ weit ist der Bahnhof?"],correct:"Wie",ar:"كم يبعد المحطة؟",wrong:["Was","Wo","Wann"]},
  {s:["___ spielst du Fußball?"],correct:"Wo",ar:"أين تلعب كرة القدم؟",wrong:["Was","Wann","Wie"]},
  {s:["___ hast du gestern gegessen?"],correct:"Was",ar:"ماذا أكلت أمس؟",wrong:["Wer","Wann","Wie"]},
  {s:["___ kommt er so spät?"],correct:"Warum",ar:"لماذا يأتي متأخراً؟",wrong:["Wann","Wie","Was"]},
  {s:["___ Sprachen sprichst du?"],correct:"Wie viele",ar:"كم لغة تتحدث؟",wrong:["Wie viel","Was","Welche"]},
  {s:["___ hilfst du?"],correct:"Wem",ar:"من تساعد؟",wrong:["Wen","Wer","Was"]},
  {s:["___ kennst du ihn?"],correct:"Woher",ar:"من أين تعرفه؟",wrong:["Wo","Wohin","Wie"]},
  {s:["___ Farbe hat das Auto?"],correct:"Welche",ar:"ما لون السيارة؟",wrong:["Was","Wie","Wer"]},
  {s:["___ geht es dir?"],correct:"Wie",ar:"كيف حالك؟",wrong:["Was","Wer","Wann"]},
  {s:["___ hast du Geburtstag?"],correct:"Wann",ar:"متى عيد ميلادك؟",wrong:["Wie","Wo","Was"]},
  {s:["___ fährt ihr im Urlaub?"],correct:"Wohin",ar:"إلى أين ستذهبون في الإجازة؟",wrong:["Wo","Woher","Wann"]},
  {s:["___ ist dein Lehrer?"],correct:"Wer",ar:"من هو معلمك؟",wrong:["Was","Wie","Wo"]},
  {s:["___ ist das auf Deutsch?"],correct:"Wie",ar:"كيف يقال هذا بالألمانية؟",wrong:["Was","Wer","Wann"]},
  {s:["___ rufst du an?"],correct:"Wen",ar:"من ستتصل به؟",wrong:["Wer","Wem","Was"]},
  {s:["___ fährt dieser Zug?"],correct:"Wohin",ar:"إلى أين يذهب هذا القطار؟",wrong:["Wo","Woher","Wann"]},
  {s:["___ liest du gerade?"],correct:"Was",ar:"ماذا تقرأ الآن؟",wrong:["Wer","Wie","Wo"]},
  {s:["___ Auto steht dort?"],correct:"Wessen",ar:"سيارة من هذه؟",wrong:["Welches","Wer","Was"]},
  {s:["___ schreibst du die E-Mail?"],correct:"Wem",ar:"لمن تكتب البريد الإلكتروني؟",wrong:["Wen","Wer","Was"]},
  {s:["___ lernst du so viel?"],correct:"Warum",ar:"لماذا تتعلم كثيراً؟",wrong:["Wie","Wann","Was"]},
  {s:["___ ist die Bibliothek?"],correct:"Wo",ar:"أين المكتبة؟",wrong:["Wohin","Woher","Was"]},
  {s:["___ kommst du nach Hause?"],correct:"Wann",ar:"متى ستعود إلى البيت؟",wrong:["Wie","Wo","Was"]},
];

function shuffle(a){return[...a].sort(()=>Math.random()-.5)}
let qs=[],qi=0,correct=0,wrong=0,streak=0,answered=false;

function init(){qs=shuffle(QS);qi=0;correct=0;wrong=0;streak=0;answered=false;showQ();}

function showQ(){
  if(qi>=qs.length){showDone();return;}
  answered=false;
  const q=qs[qi];
  document.getElementById('counter').textContent='Frage '+(qi+1)+' / '+qs.length;
  document.getElementById('pct').textContent=Math.round(qi/qs.length*100)+'%';
  document.getElementById('prog').style.width=(qi/qs.length*100)+'%';
  document.getElementById('fbmsg').textContent='';
  document.getElementById('fbmsg').className='fbmsg';
  const oldnxt=document.getElementById('nxt-btn');if(oldnxt)oldnxt.remove();

  // Build sentence
  const sent=document.getElementById('qsentence');sent.innerHTML='';
  const parts=q.s[0].split('___');
  if(parts[0]){const s=document.createElement('span');s.textContent=parts[0];sent.appendChild(s);}
  const blank=document.createElement('span');blank.className='q-blank';blank.id='q-blank';blank.textContent='___';sent.appendChild(blank);
  if(parts[1]){const s=document.createElement('span');s.textContent=parts[1];sent.appendChild(s);}

  document.getElementById('qar').textContent=q.ar;

  // Options
  const choices=shuffle([q.correct,...q.wrong.slice(0,3)]);
  const opts=document.getElementById('opts');opts.innerHTML='';
  choices.forEach(ch=>{
    const b=document.createElement('button');b.className='opt';b.textContent=ch;
    b.onclick=()=>pick(b,ch,q);
    opts.appendChild(b);
  });
}

function pick(btn,val,q){
  if(answered)return;answered=true;
  const ok=val===q.correct;
  const blank=document.getElementById('q-blank');
  blank.textContent=val;blank.classList.add(ok?'filled-ok':'filled-no');
  document.querySelectorAll('.opt').forEach(b=>{
    b.disabled=true;
    if(b.textContent===q.correct)b.classList.add('ok');
    else if(b===btn&&!ok)b.classList.add('no');
    else b.classList.add('dim');
  });
  const qcard=document.getElementById('qcard');
  const fb=document.getElementById('fbmsg');
  if(ok){
    correct++;streak++;
    fb.textContent='✓ Richtig!'+(streak>=3?' 🔥 '+streak+'er Streak!':'');
    fb.className='fbmsg ok';
    qcard.classList.add('fok');setTimeout(()=>qcard.classList.remove('fok'),350);
  } else {
    wrong++;streak=0;
    fb.textContent='✗ Richtig: '+q.correct;
    fb.className='fbmsg no';
    qcard.classList.add('fno','shake');setTimeout(()=>qcard.classList.remove('fno','shake'),400);
  }
  document.getElementById('sc-c').textContent=correct;
  document.getElementById('sc-w').textContent=wrong;
  document.getElementById('sc-s').textContent=streak;
  const nb=document.createElement('button');nb.className='nxt';nb.id='nxt-btn';
  nb.textContent=qi+1<qs.length?'Weiter →':'Ergebnis →';
  nb.onclick=()=>{qi++;showQ();};
  document.getElementById('fbrow').appendChild(nb);
}

function showDone(){
  const total=correct+wrong,pct=Math.round(correct/total*100)||0;
  document.querySelector('.qwrap').style.display='none';
  document.getElementById('opts').style.display='none';
  document.getElementById('fbrow').style.display='none';
  const d=document.createElement('div');d.className='done-scr';
  d.innerHTML=`<div style="font-size:52px">${pct>=90?'🏆':pct>=70?'🎉':pct>=50?'💪':'📚'}</div>
  <h2>Quiz beendet!</h2>
  <div style="font-family:'DM Serif Display',serif;font-size:60px;line-height:1">${pct}%</div>
  <div class="dgrid">
    <div class="dg"><div class="dg-n" style="color:var(--green)">${correct}</div><div class="dg-l">Richtig</div></div>
    <div class="dg"><div class="dg-n" style="color:var(--red)">${wrong}</div><div class="dg-l">Falsch</div></div>
    <div class="dg"><div class="dg-n">${total}</div><div class="dg-l">Gesamt</div></div>
  </div>
  <button class="restart" onclick="location.reload()">Nochmal ↺</button>`;
  document.querySelector('.footer').before(d);
}
init();
</script>
</body>
</html>
