<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kasus Quiz — Spiel Deutsch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F4EF;--surface:#fff;--text:#1C1917;--muted:#78716C;--hint:#A8A29E;
  --akk:#185FA5;--akk-l:#E6F1FB;--akk-t:#0C447C;
  --dat:#1D9E75;--dat-l:#E1F5EE;--dat-t:#0F6E56;
  --gen:#7C3AED;--gen-l:#EDE9FE;--gen-t:#5B21B6;
  --wex:#B45309;--wex-l:#FEF3C7;--wex-t:#92400E;
  --red:#D85A30;--red-l:#FAECE7;--red-t:#993C1D;
  --border:rgba(28,25,23,0.1);--bm:rgba(28,25,23,0.15);
  --r:16px;--rs:12px;--sh:0 2px 12px rgba(28,25,23,0.07);--shc:0 8px 32px rgba(28,25,23,0.12)
}
html,body{min-height:100%;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);-webkit-font-smoothing:antialiased}
body{display:flex;flex-direction:column;align-items:center;padding-bottom:32px}
.hdr{width:100%;max-width:540px;padding:20px 20px 0}
.title{font-family:'DM Serif Display',serif;font-size:clamp(18px,5vw,24px)}
.subtitle{font-size:12px;color:var(--muted);margin-top:3px}
.prog-wrap{width:100%;max-width:540px;padding:14px 20px 0}
.prog-meta{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:6px}
.prog-bar{height:4px;background:var(--border);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;background:var(--akk);border-radius:4px;transition:width .4s}
.scores{width:100%;max-width:540px;padding:10px 20px 0;display:flex;gap:10px}
.sc{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:10px 8px;text-align:center;box-shadow:var(--sh)}
.sc-n{font-family:'DM Serif Display',serif;font-size:22px;line-height:1}
.sc-l{font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--hint);margin-top:3px}
.qcard{width:100%;max-width:540px;padding:12px 20px 0}
.qc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shc);padding:clamp(20px,5vw,28px) 24px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:6px;min-height:130px;justify-content:center;position:relative;overflow:hidden}
.qc::after{content:'';position:absolute;inset:0;border-radius:var(--r);opacity:0;pointer-events:none}
.qc.flash-ok::after{background:var(--dat-l);animation:fl .35s ease forwards}
.qc.flash-no::after{background:var(--red-l);animation:fl .35s ease forwards}
@keyframes fl{0%{opacity:.7}100%{opacity:0}}
.qc.shake{animation:sk .4s cubic-bezier(.36,.07,.19,.97)}
@keyframes sk{10%,90%{transform:translateX(-3px)}20%,80%{transform:translateX(4px)}30%,50%,70%{transform:translateX(-5px)}40%,60%{transform:translateX(5px)}}
.ql{font-size:10px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--hint)}
.qp{font-family:'DM Serif Display',serif;font-size:clamp(36px,10vw,52px);color:var(--text);line-height:1.1}
.qex{font-size:13px;color:var(--muted);line-height:1.5;max-width:300px;margin-top:2px}
.opts{width:100%;max-width:540px;padding:12px 20px 0;display:grid;grid-template-columns:1fr 1fr;gap:10px}
.opt{background:var(--surface);border:1.5px solid var(--bm);border-radius:var(--rs);padding:clamp(14px,4vw,18px) 12px;font-family:'DM Sans',sans-serif;font-size:clamp(13px,3.5vw,15px);font-weight:600;color:var(--text);cursor:pointer;text-align:center;transition:all .12s;box-shadow:var(--sh);-webkit-tap-highlight-color:transparent}
.opt:active:not([disabled]){transform:scale(.96)}
.opt.akk-sel{background:var(--akk-l);border-color:var(--akk);color:var(--akk-t)}
.opt.dat-sel{background:var(--dat-l);border-color:var(--dat);color:var(--dat-t)}
.opt.gen-sel{background:var(--gen-l);border-color:var(--gen);color:var(--gen-t)}
.opt.wex-sel{background:var(--wex-l);border-color:var(--wex);color:var(--wex-t)}
.opt.wrong-sel{background:var(--red-l);border-color:var(--red);color:var(--red-t)}
.opt.dim{opacity:.35}
.opt[disabled]{cursor:default}
.fb-row{width:100%;max-width:540px;padding:10px 20px 0;display:flex;align-items:center;justify-content:space-between;gap:12px;min-height:48px}
.fb-msg{font-size:14px;font-weight:500;color:var(--muted);flex:1}
.fb-msg.ok{color:var(--dat-t)}
.fb-msg.no{color:var(--red-t)}
.next-btn{padding:10px 22px;border-radius:var(--rs);background:var(--text);color:var(--bg);border:none;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;-webkit-tap-highlight-color:transparent;white-space:nowrap}
.done-scr{width:100%;max-width:540px;padding:40px 20px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:12px}
.done-scr h2{font-family:'DM Serif Display',serif;font-size:30px}
.done-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;margin-top:8px}
.dg{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:14px 8px;text-align:center;box-shadow:var(--sh)}
.dg-n{font-family:'DM Serif Display',serif;font-size:26px;line-height:1}
.dg-l{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--hint);margin-top:4px}
.restart{padding:13px 32px;border-radius:var(--rs);background:var(--text);color:var(--bg);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;border:none;cursor:pointer;margin-top:8px}
.footer{padding:20px 0 8px;font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--hint);text-align:center;width:100%}
</style>
</head>
<body>
<div class="hdr">
  <div class="title">Kasus Quiz</div>
  <div class="subtitle">Akkusativ, Dativ oder Genitiv?</div>
</div>
<div class="prog-wrap">
  <div class="prog-meta"><span id="counter">Frage 1 / 35</span><span id="pct">0%</span></div>
  <div class="prog-bar"><div class="prog-fill" id="prog" style="width:0%"></div></div>
</div>
<div class="scores">
  <div class="sc"><div class="sc-n" id="sc-c" style="color:var(--dat)">0</div><div class="sc-l">Richtig</div></div>
  <div class="sc"><div class="sc-n" id="sc-w" style="color:var(--red)">0</div><div class="sc-l">Falsch</div></div>
  <div class="sc"><div class="sc-n" id="sc-s" style="color:var(--wex)">0</div><div class="sc-l">Streak</div></div>
</div>
<div class="qcard">
  <div class="qc" id="qc">
    <div class="ql">Präposition</div>
    <div class="qp" id="qp">durch</div>
    <div class="qex" id="qex">Er geht durch den Park.</div>
  </div>
</div>
<div class="opts" id="opts"></div>
<div class="fb-row" id="fbrow">
  <div class="fb-msg" id="fbmsg"></div>
</div>
<div class="footer">by Mostafa Toumi</div>
<script>
const PRAEP=[
  {p:"durch",c:"Akkusativ",ex:"Er geht durch den Park."},
  {p:"für",c:"Akkusativ",ex:"Das ist für dich."},
  {p:"gegen",c:"Akkusativ",ex:"Er ist gegen die Idee."},
  {p:"ohne",c:"Akkusativ",ex:"Ohne dich bin ich nichts."},
  {p:"um",c:"Akkusativ",ex:"Wir sitzen um den Tisch."},
  {p:"bis",c:"Akkusativ",ex:"Bis nächsten Montag."},
  {p:"entlang",c:"Akkusativ",ex:"Den Fluss entlang gehen."},
  {p:"aus",c:"Dativ",ex:"Er kommt aus der Schweiz."},
  {p:"außer",c:"Dativ",ex:"Außer mir war niemand da."},
  {p:"bei",c:"Dativ",ex:"Ich wohne bei meinen Eltern."},
  {p:"mit",c:"Dativ",ex:"Ich fahre mit dem Bus."},
  {p:"nach",c:"Dativ",ex:"Nach der Schule gehe ich heim."},
  {p:"seit",c:"Dativ",ex:"Seit einem Jahr lerne ich Deutsch."},
  {p:"von",c:"Dativ",ex:"Das Buch ist von meiner Mutter."},
  {p:"zu",c:"Dativ",ex:"Ich gehe zu meiner Oma."},
  {p:"gegenüber",c:"Dativ",ex:"Gegenüber dem Bahnhof."},
  {p:"wegen",c:"Genitiv",ex:"Wegen des Regens blieben wir zuhause."},
  {p:"trotz",c:"Genitiv",ex:"Trotz des Regens gingen wir raus."},
  {p:"während",c:"Genitiv",ex:"Während des Unterrichts."},
  {p:"statt",c:"Genitiv",ex:"Statt des Autos nehme ich das Rad."},
  {p:"innerhalb",c:"Genitiv",ex:"Innerhalb der Stadt."},
  {p:"außerhalb",c:"Genitiv",ex:"Außerhalb der Stadt."},
  {p:"oberhalb",c:"Genitiv",ex:"Oberhalb der Wolken."},
  {p:"unterhalb",c:"Genitiv",ex:"Unterhalb des Berges."},
  {p:"diesseits",c:"Genitiv",ex:"Diesseits der Grenze."},
  {p:"jenseits",c:"Genitiv",ex:"Jenseits des Flusses."},
  {p:"an",c:"Wechsel",ex:"An die Wand (Akk) / An der Wand (Dat)"},
  {p:"auf",c:"Wechsel",ex:"Auf den Tisch (Akk) / Auf dem Tisch (Dat)"},
  {p:"hinter",c:"Wechsel",ex:"Hinter die Tür (Akk) / Hinter der Tür (Dat)"},
  {p:"in",c:"Wechsel",ex:"In die Schule (Akk) / In der Schule (Dat)"},
  {p:"neben",c:"Wechsel",ex:"Neben mich (Akk) / Neben mir (Dat)"},
  {p:"über",c:"Wechsel",ex:"Über die Stadt (Akk) / Über der Stadt (Dat)"},
  {p:"unter",c:"Wechsel",ex:"Unter den Tisch (Akk) / Unter dem Tisch (Dat)"},
  {p:"vor",c:"Wechsel",ex:"Vor das Haus (Akk) / Vor dem Haus (Dat)"},
  {p:"zwischen",c:"Wechsel",ex:"Zwischen die Stühle (Akk) / Zwischen den Stühlen (Dat)"},
];
const CHOICES=["Akkusativ","Dativ","Genitiv","Wechsel"];
const CLR={Akkusativ:"akk-sel",Dativ:"dat-sel",Genitiv:"gen-sel",Wechsel:"wex-sel"};

let qs=[],qi=0,correct=0,wrong=0,streak=0,answered=false;
function shuffle(a){return[...a].sort(()=>Math.random()-.5)}
function init(){qs=shuffle(PRAEP);qi=0;correct=0;wrong=0;streak=0;answered=false;showQ();}
function showQ(){
  if(qi>=qs.length){showDone();return;}
  answered=false;
  const q=qs[qi];
  document.getElementById('qp').textContent=q.p;
  document.getElementById('qex').textContent=q.ex;
  document.getElementById('counter').textContent='Frage '+(qi+1)+' / '+qs.length;
  document.getElementById('pct').textContent=Math.round(qi/qs.length*100)+'%';
  document.getElementById('prog').style.width=(qi/qs.length*100)+'%';
  document.getElementById('fbmsg').textContent='';
  document.getElementById('fbmsg').className='fb-msg';
  const oldnext=document.getElementById('next-btn');
  if(oldnext)oldnext.remove();
  const opts=document.getElementById('opts');
  opts.innerHTML='';
  CHOICES.forEach(ch=>{
    const btn=document.createElement('button');
    btn.className='opt';btn.textContent=ch;
    btn.onclick=()=>handleAns(btn,ch,q.c);
    opts.appendChild(btn);
  });
}
function handleAns(btn,chosen,correct_c){
  if(answered)return;answered=true;
  const isOk=chosen===correct_c;
  document.querySelectorAll('.opt').forEach(b=>{
    b.disabled=true;
    if(b.textContent===correct_c)b.classList.add(CLR[correct_c]);
    else if(b===btn&&!isOk)b.classList.add('wrong-sel');
    else b.classList.add('dim');
  });
  const qc=document.getElementById('qc');
  const fb=document.getElementById('fbmsg');
  if(isOk){
    correct++;streak++;
    fb.textContent='✓ Richtig!'+(streak>=3?' 🔥 '+streak+'er Streak!':'');
    fb.className='fb-msg ok';
    qc.classList.add('flash-ok');setTimeout(()=>qc.classList.remove('flash-ok'),350);
  } else {
    wrong++;streak=0;
    fb.textContent='✗ Falsch — richtig: '+correct_c;
    fb.className='fb-msg no';
    qc.classList.add('flash-no','shake');
    setTimeout(()=>qc.classList.remove('flash-no','shake'),400);
  }
  document.getElementById('sc-c').textContent=correct;
  document.getElementById('sc-w').textContent=wrong;
  document.getElementById('sc-s').textContent=streak;
  const nb=document.createElement('button');
  nb.className='next-btn';nb.id='next-btn';
  nb.textContent=qi+1<qs.length?'Weiter →':'Ergebnis →';
  nb.onclick=()=>{qi++;showQ();};
  document.getElementById('fbrow').appendChild(nb);
}
function showDone(){
  const total=correct+wrong;
  const pct=Math.round(correct/total*100)||0;
  document.querySelector('.qcard').style.display='none';
  document.getElementById('opts').style.display='none';
  document.getElementById('fbrow').style.display='none';
  const d=document.createElement('div');d.className='done-scr';
  d.innerHTML=`<div style="font-size:52px">${pct>=90?'🏆':pct>=70?'🎉':pct>=50?'💪':'📚'}</div>
  <h2>Quiz beendet!</h2>
  <div style="font-family:'DM Serif Display',serif;font-size:60px;line-height:1">${pct}%</div>
  <div class="done-grid">
    <div class="dg"><div class="dg-n" style="color:var(--dat)">${correct}</div><div class="dg-l">Richtig</div></div>
    <div class="dg"><div class="dg-n" style="color:var(--red)">${wrong}</div><div class="dg-l">Falsch</div></div>
    <div class="dg"><div class="dg-n" style="color:var(--wex)">${total}</div><div class="dg-l">Gesamt</div></div>
  </div>
  <button class="restart" onclick="location.reload()">Nochmal ↺</button>`;
  document.querySelector('.footer').before(d);
}
init();
</script>
</body>
</html>
