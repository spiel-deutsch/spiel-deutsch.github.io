<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Verben mit Präpositionen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F4EF;
    --surface: #FFFFFF;
    --text: #1C1917;
    --text-muted: #78716C;
    --text-hint: #A8A29E;
    --green: #1D9E75;
    --green-light: #E1F5EE;
    --green-text: #0F6E56;
    --red: #D85A30;
    --red-light: #FAECE7;
    --red-text: #993C1D;
    --border: rgba(28,25,23,0.1);
    --border-mid: rgba(28,25,23,0.15);
    --radius: 16px;
    --radius-sm: 10px;
    --shadow: 0 2px 12px rgba(28,25,23,0.08);
    --shadow-card: 0 8px 32px rgba(28,25,23,0.12);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 0;
  }

  /* ── Header ── */
  .app-header {
    width: 100%;
    max-width: 540px;
    padding: 20px 20px 0;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .app-title {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(20px, 5vw, 26px);
    color: var(--text);
    letter-spacing: -0.3px;
  }

  .app-subtitle {
    font-size: 13px;
    color: var(--text-muted);
  }

  /* ── Progress ── */
  .progress-wrap {
    width: 100%;
    max-width: 540px;
    padding: 16px 20px 0;
  }

  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }

  .progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--green);
    border-radius: 4px;
    transition: width 0.4s cubic-bezier(.4,0,.2,1);
  }

  /* ── Filters ── */
  .filter-wrap {
    width: 100%;
    max-width: 540px;
    padding: 14px 20px 0;
    overflow-x: auto;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  .filter-wrap::-webkit-scrollbar { display: none; }

  .filter-row {
    display: flex;
    gap: 7px;
    width: max-content;
  }

  .filter-btn {
    padding: 5px 13px;
    border-radius: 20px;
    border: 1px solid var(--border-mid);
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    cursor: pointer;
    background: var(--surface);
    color: var(--text-muted);
    transition: all 0.15s;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
  }

  .filter-btn.active {
    background: var(--green-light);
    color: var(--green-text);
    border-color: var(--green);
  }

  /* ── Card area ── */
  .card-area {
    width: 100%;
    max-width: 540px;
    padding: 16px 20px;
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .card-wrap {
    perspective: 1000px;
    height: clamp(200px, 42vw, 260px);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  .card {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(.4,0,.2,1);
  }

  .card.flipped { transform: rotateY(180deg); }

  .face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: var(--radius);
    background: var(--surface);
    box-shadow: var(--shadow-card);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    gap: 8px;
    border: 1px solid var(--border);
  }

  .back { transform: rotateY(180deg); }

  .card-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text-hint);
    margin-bottom: 4px;
  }

  .verb {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(26px, 7vw, 36px);
    color: var(--text);
    text-align: center;
    line-height: 1.2;
  }

  .arabic {
    font-size: clamp(14px, 3.5vw, 17px);
    color: var(--text-muted);
    direction: rtl;
    text-align: center;
  }

  .hint {
    font-size: 11px;
    color: var(--text-hint);
    margin-top: 6px;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .prep-badge {
    padding: 6px 18px;
    border-radius: 20px;
    font-size: clamp(14px, 3.5vw, 16px);
    font-weight: 600;
    background: var(--green-light);
    color: var(--green-text);
    letter-spacing: 0.2px;
  }

  /* ── Tap hint icon ── */
  .tap-icon {
    width: 18px;
    height: 18px;
    opacity: 0.4;
  }

  /* ── Buttons ── */
  .btns {
    display: flex;
    gap: 10px;
    margin-top: 14px;
  }

  .btn {
    flex: 1;
    padding: 13px 10px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border-mid);
    background: var(--surface);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
    box-shadow: var(--shadow);
  }

  .btn:active { transform: scale(0.97); }

  .btn.wrong {
    border-color: var(--red);
    color: var(--red-text);
    background: var(--red-light);
  }

  .btn.correct {
    border-color: var(--green);
    color: var(--green-text);
    background: var(--green-light);
  }

  .btn.flip-btn {
    background: var(--text);
    color: var(--bg);
    border-color: var(--text);
  }

  /* ── Stats ── */
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-top: 14px;
  }

  .stat {
    background: var(--surface);
    border-radius: var(--radius-sm);
    padding: 12px 8px;
    text-align: center;
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
  }

  .stat-n {
    font-family: 'DM Serif Display', serif;
    font-size: 26px;
    line-height: 1;
    color: var(--text);
  }

  .stat-n.green { color: var(--green); }
  .stat-n.red   { color: var(--red); }

  .stat-l {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
    font-weight: 500;
    letter-spacing: 0.3px;
  }

  /* ── Done screen ── */
  .done-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    text-align: center;
    padding: 40px 20px;
    gap: 12px;
  }

  .done-emoji {
    font-size: 48px;
    margin-bottom: 8px;
  }

  .done-title {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    color: var(--text);
  }

  .done-score {
    font-size: 15px;
    color: var(--text-muted);
  }

  .done-score span { font-weight: 600; color: var(--text); }

  .restart-btn {
    margin-top: 12px;
    padding: 13px 32px;
    border-radius: var(--radius-sm);
    background: var(--text);
    color: var(--bg);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    border: none;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .restart-btn:active { transform: scale(0.97); }

  /* ── Responsive tweaks ── */
  @media (min-width: 600px) {
    body { padding-top: 24px; }
    .app-header, .progress-wrap, .filter-wrap, .card-area {
      padding-left: 0; padding-right: 0;
    }
    .app-header { padding-top: 0; }
  }

  @media (max-height: 640px) {
    .card-wrap { height: 180px; }
    .stats { margin-top: 10px; }
    .btns { margin-top: 10px; }
  }

  .footer {
    width: 100%;
    text-align: center;
    padding: 18px 0 20px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-hint);
  }
</style>
</head>
<body>

<div class="app-header">
  <div class="app-title">Verben mit Präpositionen</div>
  <div class="app-subtitle">48 Verben — Lernkarten</div>
</div>

<div class="progress-wrap">
  <div class="progress-meta">
    <span id="counter">1 / 48</span>
    <span id="pct">0%</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="prog" style="width:0%"></div></div>
</div>

<div class="filter-wrap">
  <div class="filter-row">
    <button class="filter-btn active" onclick="setFilter('all',this)">alle</button>
    <button class="filter-btn" onclick="setFilter('auf',this)">auf</button>
    <button class="filter-btn" onclick="setFilter('an',this)">an</button>
    <button class="filter-btn" onclick="setFilter('über',this)">über</button>
    <button class="filter-btn" onclick="setFilter('mit',this)">mit</button>
    <button class="filter-btn" onclick="setFilter('von',this)">von</button>
    <button class="filter-btn" onclick="setFilter('für',this)">für</button>
    <button class="filter-btn" onclick="setFilter('zu',this)">zu</button>
    <button class="filter-btn" onclick="setFilter('nach',this)">nach</button>
    <button class="filter-btn" onclick="setFilter('vor',this)">vor</button>
    <button class="filter-btn" onclick="setFilter('um',this)">um</button>
  </div>
</div>

<div class="card-area" id="main-area">
  <div class="card-wrap" id="card-wrap" onclick="flipCard()">
    <div class="card" id="card">
      <div class="face front">
        <div class="card-label">Verb</div>
        <div class="verb" id="verb">warten</div>
        <div class="arabic" id="arabic">ينتظر</div>
        <div class="hint">
          <svg class="tap-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M9 11V6a2 2 0 114 0v5m0 0v3m0-3h2.5a2 2 0 012 2v3a4 4 0 01-4 4H10a4 4 0 01-4-4v-3a2 2 0 012-2H10z"/>
          </svg>
          tippen zum umdrehen
        </div>
      </div>
      <div class="face back">
        <div class="card-label">Präposition</div>
        <div class="verb" id="verb2">warten</div>
        <div class="prep-badge" id="prep">auf + Akk</div>
        <div class="arabic" id="arabic2">ينتظر</div>
      </div>
    </div>
  </div>

  <div class="btns" id="btns" style="display:none">
    <button class="btn wrong" onclick="answer(false)">✗ nochmal</button>
    <button class="btn correct" onclick="answer(true)">✓ gewusst</button>
  </div>
  <div class="btns" id="flipbtn">
    <button class="btn flip-btn" onclick="flipCard()">umdrehen</button>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-n green" id="s-correct">0</div>
      <div class="stat-l">gewusst</div>
    </div>
    <div class="stat">
      <div class="stat-n red" id="s-wrong">0</div>
      <div class="stat-l">nochmal</div>
    </div>
    <div class="stat">
      <div class="stat-n" id="s-left">48</div>
      <div class="stat-l">verbleibend</div>
    </div>
  </div>
</div>

<div class="footer">by Mostafa Toumi</div>

<script>
const ALL = [
  {v:"warten",a:"ينتظر",p:"auf + Akk"},
  {v:"fragen",a:"يسأل",p:"nach + Dat"},
  {v:"suchen",a:"يبحث",p:"nach + Dat"},
  {v:"teilnehmen",a:"يشارك",p:"an + Dat"},
  {v:"sich erinnern",a:"يتذكر",p:"an + Akk"},
  {v:"sich ärgern",a:"يغضب / ينزعج",p:"über + Akk"},
  {v:"sich interessieren",a:"يهتم",p:"für + Akk"},
  {v:"sich interessieren",a:"يهتم (2)",p:"an + Dat"},
  {v:"einladen",a:"يدعو",p:"zu + Dat"},
  {v:"gratulieren",a:"يهنئ",p:"zu + Dat"},
  {v:"antworten",a:"يجيب / يرد",p:"auf + Akk"},
  {v:"danken",a:"يشكر",p:"für + Akk"},
  {v:"sich gewöhnen",a:"يعتاد",p:"an + Akk"},
  {v:"sich freuen",a:"يفرح / يتطلع",p:"auf + Akk / über + Akk"},
  {v:"warnen",a:"يحذر",p:"vor + Dat"},
  {v:"aufpassen",a:"ينتبه / يحذر",p:"auf + Akk"},
  {v:"achten",a:"ينتبه / يراعي",p:"auf + Akk"},
  {v:"telefonieren",a:"يتحدث في الهاتف",p:"mit + Dat"},
  {v:"träumen",a:"يحلم",p:"von + Dat"},
  {v:"sich informieren",a:"يستعلم",p:"über + Akk"},
  {v:"sich streiten",a:"يتشاجر",p:"mit + Dat / über + Akk"},
  {v:"sprechen",a:"يتحدث",p:"mit + Dat / über + Akk"},
  {v:"denken",a:"يفكر",p:"an + Akk"},
  {v:"nachdenken",a:"يفكر بعمق",p:"über + Akk"},
  {v:"lachen",a:"يضحك",p:"über + Akk"},
  {v:"weinen",a:"يبكي",p:"über + Akk"},
  {v:"sich trennen",a:"ينفصل",p:"von + Dat"},
  {v:"leiden",a:"يعاني",p:"an + Dat / unter + Dat"},
  {v:"sich fürchten",a:"يخاف",p:"vor + Dat"},
  {v:"zufrieden sein",a:"يكون راضياً",p:"mit + Dat"},
  {v:"spielen",a:"يلعب",p:"mit + Dat"},
  {v:"sich beschäftigen",a:"ينشغل / يعمل على",p:"mit + Dat"},
  {v:"klagen",a:"يشتكي",p:"über + Akk"},
  {v:"sich beschweren",a:"يتذمر / يشتكي",p:"über + Akk"},
  {v:"sich entschuldigen",a:"يعتذر",p:"für + Akk"},
  {v:"sich entscheiden",a:"يقرر",p:"für + Akk / gegen + Akk"},
  {v:"sterben",a:"يموت",p:"an + Dat"},
  {v:"streben",a:"يسعى",p:"nach + Dat"},
  {v:"hoffen",a:"يأمل",p:"auf + Akk"},
  {v:"zweifeln",a:"يشك",p:"an + Dat"},
  {v:"sich vorbereiten",a:"يستعد",p:"auf + Akk"},
  {v:"schmecken",a:"طعمه / مذاقه",p:"nach + Dat"},
  {v:"sich entschuldigen",a:"يعتذر (bei)",p:"bei + Dat / für + Akk"},
  {v:"zahlen",a:"يدفع",p:"für + Akk"},
  {v:"es geht",a:"يتعلق بـ",p:"um + Akk"},
  {v:"sich bewerben",a:"يتقدم لوظيفة",p:"um + Akk"},
  {v:"erzählen",a:"يحكي / يروي",p:"von + Dat"},
];

let deck=[], idx=0, correct=0, wrong=0, flipped=false, filter='all';

function setFilter(f, btn) {
  filter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  resetDeck();
}

function resetDeck() {
  deck = ALL.filter(x => filter==='all' || x.p.includes(filter));
  deck = deck.sort(() => Math.random()-0.5);
  idx=0; correct=0; wrong=0; flipped=false;
  document.getElementById('card').classList.remove('flipped');
  document.getElementById('btns').style.display='none';
  document.getElementById('flipbtn').style.display='';
  updateStats(); showCard();
}

function showCard() {
  if (idx >= deck.length) { showDone(); return; }
  const c = deck[idx];
  document.getElementById('verb').textContent = c.v;
  document.getElementById('verb2').textContent = c.v;
  document.getElementById('arabic').textContent = c.a;
  document.getElementById('arabic2').textContent = c.a;
  document.getElementById('prep').textContent = c.p;
  const total = deck.length;
  const done = idx;
  document.getElementById('counter').textContent = (idx+1)+' / '+total;
  document.getElementById('pct').textContent = Math.round(done/total*100)+'%';
  document.getElementById('prog').style.width = (done/total*100)+'%';
  document.getElementById('s-left').textContent = total - idx;
  flipped=false;
  document.getElementById('card').classList.remove('flipped');
  document.getElementById('btns').style.display='none';
  document.getElementById('flipbtn').style.display='';
}

function flipCard() {
  if (flipped) return;
  flipped=true;
  document.getElementById('card').classList.add('flipped');
  setTimeout(()=>{
    document.getElementById('btns').style.display='';
    document.getElementById('flipbtn').style.display='none';
  }, 250);
}

function answer(ok) {
  if (ok) correct++; else { wrong++; deck.push(deck[idx]); }
  idx++;
  updateStats(); showCard();
}

function updateStats() {
  document.getElementById('s-correct').textContent = correct;
  document.getElementById('s-wrong').textContent = wrong;
  document.getElementById('s-left').textContent = Math.max(0, deck.length-idx);
}

function showDone() {
  const pct = Math.round(correct/(correct+wrong)*100)||0;
  document.getElementById('main-area').innerHTML = `
    <div class="done-screen">
      <div class="done-emoji">${pct>=80?'🎉':pct>=50?'💪':'📚'}</div>
      <div class="done-title">Geschafft!</div>
      <div class="done-score">
        <span>${correct}</span> gewusst &nbsp;·&nbsp; <span>${wrong}</span> nochmal &nbsp;·&nbsp; <span>${pct}%</span>
      </div>
      <button class="restart-btn" onclick="location.reload()">von vorne ↺</button>
    </div>`;
}

resetDeck();
</script>
</body>
</html>
