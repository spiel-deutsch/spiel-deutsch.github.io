<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Präpositionen Ort & Zeit — Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F4EF;--surface:#fff;--text:#1C1917;--muted:#78716C;--hint:#A8A29E;
  --ort:#0F766E;--ortl:#CCFBF1;--ortt:#134E4A;--ortb:#5EEAD4;
  --zeit:#B45309;--zeitl:#FEF3C7;--zeitt:#92400E;--zeitb:#FDE68A;
  --richt:#185FA5;--richtl:#E6F1FB;--richtt:#0C447C;--richtb:#B5D4F4;
  --green:#1D9E75;--greenl:#E1F5EE;--greent:#0F6E56;
  --red:#D85A30;--redl:#FAECE7;--redt:#7C2D12;
  --amber:#B45309;--amberl:#FEF3C7;
  --border:rgba(28,25,23,0.1);--bm:rgba(28,25,23,0.15);
  --r:16px;--rs:12px;--sh:0 2px 12px rgba(28,25,23,0.07);--shc:0 8px 32px rgba(28,25,23,0.12)
}
html,body{min-height:100%;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);-webkit-font-smoothing:antialiased}
body{display:flex;flex-direction:column;align-items:center;padding-bottom:32px}
.hdr{width:100%;max-width:560px;padding:20px 20px 0}
.title{font-family:'DM Serif Display',serif;font-size:clamp(18px,5vw,24px)}
.subtitle{font-size:12px;color:var(--muted);margin-top:3px}
.prog-wrap{width:100%;max-width:560px;padding:12px 20px 0}
.prog-meta{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:6px}
.prog-bar{height:4px;background:var(--border);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;background:var(--ort);border-radius:4px;transition:width .4s,background .3s}
.scores{width:100%;max-width:560px;padding:10px 20px 0;display:flex;gap:10px}
.sc{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:10px 8px;text-align:center;box-shadow:var(--sh)}
.sc-n{font-family:'DM Serif Display',serif;font-size:22px;line-height:1}
.sc-l{font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--hint);margin-top:3px}
.cat-indicator{width:100%;max-width:560px;padding:10px 20px 0;display:flex;align-items:center;gap:8px}
.cat-badge{padding:4px 13px;border-radius:20px;font-size:12px;font-weight:600}
.qwrap{width:100%;max-width:560px;padding:6px 20px 0}
.qcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shc);padding:clamp(18px,5vw,26px) 22px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:9px;min-height:180px;justify-content:center;position:relative;overflow:hidden}
.qcard::after{content:'';position:absolute;inset:0;border-radius:var(--r);opacity:0;pointer-events:none}
.qcard.fok::after{background:var(--greenl);animation:fl .35s ease forwards}
.qcard.fno::after{background:var(--redl);animation:fl .35s ease forwards}
@keyframes fl{0%{opacity:.7}100%{opacity:0}}
.qcard.shake{animation:sk .4s cubic-bezier(.36,.07,.19,.97)}
@keyframes sk{10%,90%{transform:translateX(-3px)}20%,80%{transform:translateX(4px)}30%,50%,70%{transform:translateX(-5px)}40%,60%{transform:translateX(5px)}}
.q-label{font-size:10px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--hint)}
.q-sentence{font-family:'DM Serif Display',serif;font-size:clamp(17px,4.5vw,24px);color:var(--text);line-height:1.5;display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:5px}
.q-blank{display:inline-block;min-width:70px;border-bottom:3px solid var(--ort);text-align:center;font-size:clamp(17px,4.5vw,24px);padding:0 6px;color:var(--ortt);transition:all .2s}
.q-blank.filled-ok{border-radius:6px;padding:2px 10px;border-style:solid}
.q-blank.ort.filled-ok{background:var(--ortl);border-color:var(--ort);color:var(--ortt)}
.q-blank.zeit.filled-ok{background:var(--zeitl);border-color:var(--zeit);color:var(--zeitt)}
.q-blank.richtung.filled-ok{background:var(--richtl);border-color:var(--richt);color:var(--richtt)}
.q-blank.filled-no{border-radius:6px;padding:2px 10px;background:var(--redl);border-color:var(--red);color:var(--redt)}
.q-ar{font-size:13px;color:var(--muted);direction:rtl}
.opts{width:100%;max-width:560px;padding:12px 20px 0;display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.opt{background:var(--surface);border:1.5px solid var(--bm);border-radius:var(--rs);padding:clamp(13px,3.5vw,18px) 10px;font-family:'DM Serif Display',serif;font-size:clamp(18px,5vw,26px);color:var(--text);cursor:pointer;text-align:center;transition:all .12s;box-shadow:var(--sh);-webkit-tap-highlight-color:transparent}
.opt:active:not([disabled]){transform:scale(.96)}
.opt.ok.ort{background:var(--ortl);border-color:var(--ort);color:var(--ortt)}
.opt.ok.zeit{background:var(--zeitl);border-color:var(--zeit);color:var(--zeitt)}
.opt.ok.richtung{background:var(--richtl);border-color:var(--richt);color:var(--richtt)}
.opt.no{background:var(--redl);border-color:var(--red);color:var(--redt)}
.opt.dim{opacity:.3}
.opt[disabled]{cursor:default}
.rule-hint{width:100%;max-width:560px;padding:0 20px;min-height:36px}
.rh-box{background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);padding:10px 16px;font-size:13px;color:var(--muted);line-height:1.5}
.rh-box strong{color:var(--text);font-weight:600}
.fbrow{width:100%;max-width:560px;padding:8px 20px 0;display:flex;align-items:center;justify-content:space-between;gap:12px;min-height:48px}
.fbmsg{font-size:14px;font-weight:500;color:var(--muted);flex:1;line-height:1.5}
.fbmsg.ok{color:var(--greent)}
.fbmsg.no{color:var(--redt)}
.nxt{padding:10px 22px;border-radius:var(--rs);background:var(--text);color:var(--bg);border:none;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;white-space:nowrap}
.done-scr{width:100%;max-width:560px;padding:40px 20px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:12px}
.done-scr h2{font-family:'DM Serif Display',serif;font-size:30px}
.dgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;margin-top:8px}
.dg{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:14px 8px;text-align:center;box-shadow:var(--sh)}
.dg-n{font-family:'DM Serif Display',serif;font-size:26px;line-height:1}
.dg-l{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--hint);margin-top:4px}
.restart{padding:13px 32px;border-radius:var(--rs);background:var(--text);color:var(--bg);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;border:none;cursor:pointer;margin-top:4px}
.footer{padding:20px 0 8px;font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--hint);text-align:center;width:100%}
</style>
</head>
<body>
<div class="hdr"><div class="title">Präpositionen Quiz</div><div class="subtitle">Welche Präposition passt?</div></div>
<div class="prog-wrap">
  <div class="prog-meta"><span id="counter">Frage 1 / 45</span><span id="pct">0%</span></div>
  <div class="prog-bar"><div class="prog-fill" id="prog" style="width:0%"></div></div>
</div>
<div class="scores">
  <div class="sc"><div class="sc-n" id="sc-c" style="color:var(--green)">0</div><div class="sc-l">Richtig</div></div>
  <div class="sc"><div class="sc-n" id="sc-w" style="color:var(--red)">0</div><div class="sc-l">Falsch</div></div>
  <div class="sc"><div class="sc-n" id="sc-s" style="color:var(--amber)">0</div><div class="sc-l">Streak</div></div>
</div>
<div class="cat-indicator"><span class="cat-badge" id="cat-badge">Ort</span></div>
<div class="qwrap"><div class="qcard" id="qcard">
  <div class="q-label">Welche Präposition?</div>
  <div class="q-sentence" id="qsentence"></div>
  <div class="q-ar" id="qar"></div>
</div></div>
<div class="opts" id="opts"></div>
<div class="rule-hint" id="rule-hint"></div>
<div class="fbrow" id="fbrow"><div class="fbmsg" id="fbmsg"></div></div>
<div class="footer">by ❤️ Mostafa Toumi</div>
<script>
const CAT_META={
  ort:    {label:'Ort — Wo?',    bg:'var(--ortl)',  color:'var(--ortt)',  bar:'var(--ort)'},
  zeit:   {label:'Zeit — Wann?', bg:'var(--zeitl)', color:'var(--zeitt)', bar:'var(--zeit)'},
  richtung:{label:'Richtung — Wohin/Woher?',bg:'var(--richtl)',color:'var(--richtt)',bar:'var(--richt)'},
};
// {s: sentence with ___, correct, cat, ar, hint, wrong:[]}
const QS=[
  // ORT
  {s:"Ich wohne ___ Berlin.",correct:"in",cat:"ort",ar:"أنا أسكن في برلين",hint:"Städte ohne Artikel → in",wrong:["nach","bei","an"]},
  {s:"Er ist ___ Zimmer.",correct:"im",cat:"ort",ar:"هو في الغرفة",hint:"im = in dem — Raum mit Dativ",wrong:["am","beim","ins"]},
  {s:"Das Bild hängt ___ Wand.",correct:"an der",cat:"ort",ar:"الصورة على الجدار",hint:"an = vertikale Fläche",wrong:["auf der","in der","bei der"]},
  {s:"Das Buch liegt ___ Tisch.",correct:"auf dem",cat:"ort",ar:"الكتاب على الطاولة",hint:"auf = horizontale Fläche",wrong:["an dem","in dem","bei dem"]},
  {s:"Wir wohnen ___ Meer.",correct:"am",cat:"ort",ar:"نحن نسكن على البحر",hint:"am = an dem — Gewässer, Kante",wrong:["im","beim","zum"]},
  {s:"Ich bin ___ meiner Mutter.",correct:"bei",cat:"ort",ar:"أنا عند أمي",hint:"bei = beim jemanden sein",wrong:["zu","nach","von"]},
  {s:"Er wartet ___ Arzt.",correct:"beim",cat:"ort",ar:"هو ينتظر عند الطبيب",hint:"beim = bei dem — Person/Beruf",wrong:["zum","am","im"]},
  {s:"Sie arbeitet ___ Schule.",correct:"in der",cat:"ort",ar:"هي تعمل في المدرسة",hint:"in der Schule = Gebäude, Dativ fem.",wrong:["an der","auf der","bei der"]},
  {s:"Wir sitzen ___ Tisch.",correct:"am",cat:"ort",ar:"نحن نجلس على الطاولة",hint:"am Tisch sitzen = an + Dativ",wrong:["auf dem","im","beim"]},
  {s:"Ich bin ___ Hause.",correct:"zu",cat:"ort",ar:"أنا في البيت",hint:"zu Hause = Aufenthaltsort",wrong:["nach","bei","im"]},
  {s:"Das Café ist ___ Fluss.",correct:"am",cat:"ort",ar:"المقهى على النهر",hint:"am = an + Gewässer",wrong:["im","beim","zum"]},
  {s:"Er ist ___ Lidl.",correct:"bei",cat:"ort",ar:"هو في متجر ليدل",hint:"bei + Firma/Laden",wrong:["im","am","zum"]},
  // ZEIT
  {s:"Ich fahre ___ August.",correct:"im",cat:"zeit",ar:"سأسافر في أغسطس",hint:"Monate → im",wrong:["am","in","um"]},
  {s:"Wir treffen uns ___ Montag.",correct:"am",cat:"zeit",ar:"نلتقي يوم الاثنين",hint:"Wochentage → am",wrong:["im","in","um"]},
  {s:"Der Kurs beginnt ___ 9 Uhr.",correct:"um",cat:"zeit",ar:"تبدأ الدورة الساعة 9",hint:"Uhrzeiten → um",wrong:["am","im","nach"]},
  {s:"Ich komme ___ einer Stunde.",correct:"in",cat:"zeit",ar:"سآتي خلال ساعة",hint:"Zeitspanne: in + Dauer",wrong:["nach","seit","vor"]},
  {s:"Wir treffen uns ___ Abend.",correct:"am",cat:"zeit",ar:"نلتقي في المساء",hint:"Tageszeiten → am",wrong:["im","in","um"]},
  {s:"Das Fest ist ___ Sommer.",correct:"im",cat:"zeit",ar:"المهرجان في الصيف",hint:"Jahreszeiten → im",wrong:["am","in","um"]},
  {s:"Ich lerne ___ einem Jahr Deutsch.",correct:"seit",cat:"zeit",ar:"أتعلم الألمانية منذ سنة",hint:"seit = begann und dauert noch an",wrong:["vor","nach","in"]},
  {s:"Ruf mich ___ dem Essen an.",correct:"nach",cat:"zeit",ar:"اتصل بي بعد الأكل",hint:"nach = nach einem Ereignis",wrong:["vor","seit","bei"]},
  {s:"Ich esse etwas ___ dem Meeting.",correct:"vor",cat:"zeit",ar:"سآكل شيئاً قبل الاجتماع",hint:"vor = vor einem Ereignis",wrong:["nach","seit","in"]},
  {s:"Der Laden ist offen ___ 18 Uhr.",correct:"bis",cat:"zeit",ar:"المحل مفتوح حتى الساعة 6",hint:"bis = Ende eines Zeitraums",wrong:["um","von","seit"]},
  {s:"___ Montag habe ich frei.",correct:"ab",cat:"zeit",ar:"ابتداءً من الاثنين لدي إجازة",hint:"ab = Beginn ab einem Zeitpunkt",wrong:["seit","nach","von"]},
  {s:"___ des Films darf man nicht reden.",correct:"während",cat:"zeit",ar:"أثناء الفيلم لا يجوز الكلام",hint:"während + Genitiv = in dieser Zeit",wrong:["nach","in","seit"]},
  // RICHTUNG
  {s:"Ich fahre ___ Berlin.",correct:"nach",cat:"richtung",ar:"أنا أسافر إلى برلين",hint:"nach + Stadt/Land ohne Artikel",wrong:["in","zu","bei"]},
  {s:"Ich gehe ___ Arzt.",correct:"zum",cat:"richtung",ar:"أنا أذهب إلى الطبيب",hint:"zu/zum = Person oder Institution",wrong:["nach","in den","beim"]},
  {s:"Ich fahre ___ Schule.",correct:"zur",cat:"richtung",ar:"أنا أذهب إلى المدرسة",hint:"zur = zu der — Einrichtung fem.",wrong:["nach","in die","bei der"]},
  {s:"Wir fliegen ___ Türkei.",correct:"in die",cat:"richtung",ar:"نحن نطير إلى تركيا",hint:"Länder MIT Artikel → in die",wrong:["nach","zu","bei"]},
  {s:"Ich gehe ___ Kino.",correct:"ins",cat:"richtung",ar:"أنا أذهب إلى السينما",hint:"ins = in das — Gebäude (neutr.)",wrong:["nach","zum","an das"]},
  {s:"Ich gehe ___ Hause.",correct:"nach",cat:"richtung",ar:"أنا أذهب إلى البيت",hint:"nach Hause = Bewegung heimwärts",wrong:["zu","im","beim"]},
  {s:"Ich komme ___ Marokko.",correct:"aus",cat:"richtung",ar:"أنا من المغرب",hint:"aus = Herkunft aus Land/Stadt",wrong:["von","nach","bei"]},
  {s:"Er kommt ___ Arzt.",correct:"vom",cat:"richtung",ar:"هو قادم من الطبيب",hint:"vom = von dem — Person/Veranstaltung",wrong:["aus dem","nach","aus"]},
  {s:"Sie kommt ___ Zimmer.",correct:"aus dem",cat:"richtung",ar:"هي خارجة من الغرفة",hint:"aus = aus dem Inneren",wrong:["von dem","nach dem","bei dem"]},
  {s:"Ich gehe ___ meiner Mutter.",correct:"zu",cat:"richtung",ar:"أنا أذهب إلى أمي",hint:"zu = Richtung zu einer Person",wrong:["bei","nach","von"]},
  {s:"Das Buch liegt ___ den Tisch.",correct:"auf",cat:"richtung",ar:"ضع الكتاب على الطاولة",hint:"auf + Akk = auf eine horizontale Fläche legen",wrong:["an","in","bei"]},
  {s:"Er hängt das Bild ___ die Wand.",correct:"an",cat:"richtung",ar:"هو يعلق الصورة على الجدار",hint:"an + Akk = an eine vertikale Fläche hängen",wrong:["auf","in","bei"]},
  {s:"Wir fahren ___ Ausland.",correct:"ins",cat:"richtung",ar:"نحن نسافر إلى الخارج",hint:"ins Ausland = in das Ausland",wrong:["nach","zum","bei"]},
  {s:"Ich gehe ___ Post.",correct:"auf die",cat:"richtung",ar:"أنا أذهب إلى مكتب البريد",hint:"auf + öffentliche Einrichtung",wrong:["in die","zur","nach der"]},
  {s:"Er fährt ___ Bahnhof.",correct:"zum",cat:"richtung",ar:"هو يذهب إلى المحطة",hint:"zum = zu dem — Gebäude mask.",wrong:["nach dem","in den","am"]},
  {s:"Ich komme gerade ___ Arbeit.",correct:"von der",cat:"richtung",ar:"أنا قادم للتو من العمل",hint:"von der = Herkunft von einer Einrichtung",wrong:["aus der","nach der","bei der"]},
  {s:"Ich fahre ___ USA.",correct:"in die",cat:"richtung",ar:"أنا أسافر إلى الولايات المتحدة",hint:"USA hat Artikel (Pl.) → in die",wrong:["nach","zu den","bei den"]},
];

function shuffle(a){return[...a].sort(()=>Math.random()-.5)}
let qs=[],qi=0,correct=0,wrong=0,streak=0,answered=false;

function init(){qs=shuffle(QS);qi=0;correct=0;wrong=0;streak=0;answered=false;showQ();}

function showQ(){
  if(qi>=qs.length){showDone();return;}
  answered=false;
  const q=qs[qi];
  const cm=CAT_META[q.cat];
  document.getElementById('counter').textContent='Frage '+(qi+1)+' / '+qs.length;
  document.getElementById('pct').textContent=Math.round(qi/qs.length*100)+'%';
  document.getElementById('prog').style.width=(qi/qs.length*100)+'%';
  document.getElementById('prog').style.background=cm.bar;
  const badge=document.getElementById('cat-badge');
  badge.textContent=cm.label;badge.style.cssText=`background:${cm.bg};color:${cm.color}`;
  document.getElementById('fbmsg').textContent='';document.getElementById('fbmsg').className='fbmsg';
  document.getElementById('rule-hint').innerHTML='';
  const oldnxt=document.getElementById('nxt-btn');if(oldnxt)oldnxt.remove();

  const sent=document.getElementById('qsentence');sent.innerHTML='';
  const parts=q.s.split('___');
  if(parts[0]){const s=document.createElement('span');s.textContent=parts[0];sent.appendChild(s);}
  const blank=document.createElement('span');blank.className='q-blank';blank.id='q-blank';blank.textContent='___';sent.appendChild(blank);
  if(parts[1]){const s=document.createElement('span');s.textContent=parts[1];sent.appendChild(s);}
  document.getElementById('qar').textContent=q.ar;

  const choices=shuffle([q.correct,...q.wrong.slice(0,3)]);
  const opts=document.getElementById('opts');opts.innerHTML='';
  choices.forEach(ch=>{
    const b=document.createElement('button');b.className='opt';b.textContent=ch;
    b.onclick=()=>pick(b,ch,q);opts.appendChild(b);
  });
}

function pick(btn,val,q){
  if(answered)return;answered=true;
  const ok=val===q.correct;
  const blank=document.getElementById('q-blank');
  blank.textContent=val;
  blank.className='q-blank '+(ok?q.cat+' filled-ok':'filled-no');
  document.querySelectorAll('.opt').forEach(b=>{
    b.disabled=true;
    if(b.textContent===q.correct)b.classList.add('ok',q.cat);
    else if(b===btn&&!ok)b.classList.add('no');
    else b.classList.add('dim');
  });
  const qcard=document.getElementById('qcard');
  const fb=document.getElementById('fbmsg');
  if(ok){
    correct++;streak++;
    fb.textContent='✓ Richtig!'+(streak>=3?' 🔥 '+streak+'er Streak!':'');
    fb.className='fbmsg ok';
    qcard.classList.add('fok');setTimeout(()=>qcard.classList.remove('fok'),350);
  } else {
    wrong++;streak=0;
    fb.textContent='✗ Richtig: '+q.correct;
    fb.className='fbmsg no';
    document.getElementById('rule-hint').innerHTML=`<div class="rh-box"><strong>Regel:</strong> ${q.hint}</div>`;
    qcard.classList.add('fno','shake');setTimeout(()=>qcard.classList.remove('fno','shake'),400);
  }
  document.getElementById('sc-c').textContent=correct;
  document.getElementById('sc-w').textContent=wrong;
  document.getElementById('sc-s').textContent=streak;
  const nb=document.createElement('button');nb.className='nxt';nb.id='nxt-btn';
  nb.textContent=qi+1<qs.length?'Weiter →':'Ergebnis →';
  nb.onclick=()=>{qi++;showQ();};
  document.getElementById('fbrow').appendChild(nb);
}

function showDone(){
  const total=correct+wrong,pct=Math.round(correct/total*100)||0;
  document.querySelector('.qwrap').style.display='none';
  document.getElementById('opts').style.display='none';
  document.getElementById('fbrow').style.display='none';
  document.getElementById('rule-hint').style.display='none';
  document.querySelector('.cat-indicator').style.display='none';
  const d=document.createElement('div');d.className='done-scr';
  d.innerHTML=`<div style="font-size:52px">${pct>=90?'🏆':pct>=70?'🎉':pct>=50?'💪':'📚'}</div>
  <h2>Quiz beendet!</h2>
  <div style="font-family:'DM Serif Display',serif;font-size:60px;line-height:1">${pct}%</div>
  <div class="dgrid">
    <div class="dg"><div class="dg-n" style="color:var(--green)">${correct}</div><div class="dg-l">Richtig</div></div>
    <div class="dg"><div class="dg-n" style="color:var(--red)">${wrong}</div><div class="dg-l">Falsch</div></div>
    <div class="dg"><div class="dg-n">${total}</div><div class="dg-l">Gesamt</div></div>
  </div>
  <button class="restart" onclick="location.reload()">Nochmal ↺</button>`;
  document.querySelector('.footer').before(d);
}
init();
</script>
</body>
</html>
