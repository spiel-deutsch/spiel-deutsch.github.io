<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Präteritum Lernkarten — Spiel Deutsch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F4EF;--surface:#fff;--text:#1C1917;--muted:#78716C;--hint:#A8A29E;
  --sw:#1D9E75;--sw-l:#E1F5EE;--sw-t:#0F6E56;--sw-b:#9FE1CB;
  --st:#185FA5;--st-l:#E6F1FB;--st-t:#0C447C;--st-b:#B5D4F4;
  --tr:#B45309;--tr-l:#FEF3C7;--tr-t:#92400E;--tr-b:#FDE68A;
  --red:#D85A30;--red-l:#FAECE7;--red-t:#993C1D;
  --border:rgba(28,25,23,0.1);--bm:rgba(28,25,23,0.15);
  --r:16px;--rs:12px;--sh:0 2px 12px rgba(28,25,23,0.07);--shc:0 8px 32px rgba(28,25,23,0.12)
}
html,body{min-height:100%;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);-webkit-font-smoothing:antialiased}
body{display:flex;flex-direction:column;align-items:center;padding-bottom:32px}
.hdr{width:100%;max-width:540px;padding:20px 20px 0;display:flex;justify-content:space-between;align-items:flex-start}
.title{font-family:'DM Serif Display',serif;font-size:clamp(18px,5vw,24px)}
.subtitle{font-size:12px;color:var(--muted);margin-top:3px}
.counter{font-size:13px;color:var(--muted);margin-top:4px;white-space:nowrap}
.prog-wrap{width:100%;max-width:540px;padding:12px 20px 0}
.prog-meta{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:6px}
.prog-bar{height:4px;background:var(--border);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;background:var(--st);border-radius:4px;transition:width .4s cubic-bezier(.4,0,.2,1)}
.filters{width:100%;max-width:540px;padding:12px 20px 0;overflow-x:auto;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.filter-row{display:flex;gap:7px;width:max-content}
.fb{padding:5px 13px;border-radius:20px;border:1px solid var(--bm);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;background:var(--surface);color:var(--muted);transition:all .15s;-webkit-tap-highlight-color:transparent}
.fb.all.active{background:var(--text);color:var(--bg);border-color:var(--text)}
.fb.sw.active{background:var(--sw-l);color:var(--sw-t);border-color:var(--sw)}
.fb.st.active{background:var(--st-l);color:var(--st-t);border-color:var(--st)}
.fb.tr.active{background:var(--tr-l);color:var(--tr-t);border-color:var(--tr)}
.card-area{width:100%;max-width:540px;padding:14px 20px 0;display:flex;flex-direction:column}
.card-wrap{perspective:1000px;height:clamp(200px,44vw,260px);cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none}
.card{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,0,.2,1)}
.card.flipped{transform:rotateY(180deg)}
.face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:var(--r);background:var(--surface);box-shadow:var(--shc);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:8px;border:1px solid var(--border)}
.back{transform:rotateY(180deg)}
.f-label{font-size:11px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--hint)}
.f-inf{font-family:'DM Serif Display',serif;font-size:clamp(28px,8vw,40px);color:var(--text);line-height:1.15}
.f-ar{font-size:14px;color:var(--muted);direction:rtl}
.f-hint{font-size:11px;color:var(--hint);margin-top:4px}
.prt-badge{padding:7px 22px;border-radius:20px;font-family:'DM Serif Display',serif;font-size:clamp(20px,6vw,28px);font-weight:400}
.badge-sw{background:var(--sw-l);color:var(--sw-t)}
.badge-st{background:var(--st-l);color:var(--st-t)}
.badge-tr{background:var(--tr-l);color:var(--tr-t)}
.f-rule{font-size:12px;color:var(--hint);font-style:italic;margin-top:2px}
.btns{display:flex;gap:10px;margin-top:12px}
.btn{flex:1;padding:13px;border-radius:var(--rs);border:1px solid var(--bm);background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;box-shadow:var(--sh)}
.btn:active{transform:scale(.97)}
.btn.wrong{border-color:var(--red);color:var(--red-t);background:var(--red-l)}
.btn.correct{border-color:var(--sw);color:var(--sw-t);background:var(--sw-l)}
.btn.flip{background:var(--text);color:var(--bg);border-color:var(--text)}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:12px 8px;text-align:center;box-shadow:var(--sh)}
.stat-n{font-family:'DM Serif Display',serif;font-size:24px;line-height:1}
.stat-l{font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--hint);margin-top:3px}
.done{text-align:center;padding:40px 20px;display:flex;flex-direction:column;align-items:center;gap:12px}
.done h2{font-family:'DM Serif Display',serif;font-size:28px}
.restart{padding:13px 32px;border-radius:var(--rs);background:var(--text);color:var(--bg);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;border:none;cursor:pointer;margin-top:4px}
.footer{padding:20px 0 8px;font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--hint);text-align:center;width:100%}
</style>
</head>
<body>
<div class="hdr">
  <div><div class="title">Präteritum Lernkarten</div><div class="subtitle">Infinitiv → Präteritum</div></div>
  <span class="counter" id="counter">1 / 41</span>
</div>
<div class="prog-wrap">
  <div class="prog-meta"><span id="prog-lbl">0%</span><span id="prog-done">0 fertig</span></div>
  <div class="prog-bar"><div class="prog-fill" id="prog" style="width:0%"></div></div>
</div>
<div class="filters">
  <div class="filter-row">
    <button class="fb all active" onclick="setFilter('all',this)">Alle</button>
    <button class="fb sw" onclick="setFilter('schwach',this)">Schwach</button>
    <button class="fb st" onclick="setFilter('stark',this)">Stark</button>
    <button class="fb tr" onclick="setFilter('trennbar',this)">Trennbar</button>
  </div>
</div>
<div class="card-area" id="card-area">
  <div class="card-wrap" onclick="flipCard()">
    <div class="card" id="card">
      <div class="face front">
        <div class="f-label">Infinitiv</div>
        <div class="f-inf" id="f-inf">machen</div>
        <div class="f-ar" id="f-ar">يفعل / يصنع</div>
        <div class="f-hint">Was ist das Präteritum?</div>
      </div>
      <div class="face back">
        <div class="f-label">Präteritum</div>
        <div class="f-inf" id="b-inf">machen</div>
        <div class="prt-badge badge-sw" id="b-prt">machte</div>
        <div class="f-rule" id="b-rule">Stamm + te</div>
        <div class="f-ar" id="b-ar">يفعل / يصنع</div>
      </div>
    </div>
  </div>
  <div class="btns" id="btns" style="display:none">
    <button class="btn wrong" onclick="answer(false)">✗ nochmal</button>
    <button class="btn correct" onclick="answer(true)">✓ gewusst</button>
  </div>
  <div class="btns" id="flipbtn">
    <button class="btn flip" onclick="flipCard()">umdrehen</button>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-n" id="s-c" style="color:var(--sw)">0</div><div class="stat-l">Gewusst</div></div>
    <div class="stat"><div class="stat-n" id="s-w" style="color:var(--red)">0</div><div class="stat-l">Nochmal</div></div>
    <div class="stat"><div class="stat-n" id="s-l">41</div><div class="stat-l">Verbleibend</div></div>
  </div>
</div>
<div class="footer">by Mostafa Toumi</div>
<script>
const PRAET=[
  {inf:"machen",prt:"machte",ar:"يفعل / يصنع",type:"schwach",rule:"Stamm + te"},
  {inf:"wohnen",prt:"wohnte",ar:"يسكن",type:"schwach",rule:"Stamm + te"},
  {inf:"lernen",prt:"lernte",ar:"يتعلم",type:"schwach",rule:"Stamm + te"},
  {inf:"kochen",prt:"kochte",ar:"يطبخ",type:"schwach",rule:"Stamm + te"},
  {inf:"buchen",prt:"buchte",ar:"يحجز",type:"schwach",rule:"Stamm + te"},
  {inf:"kaufen",prt:"kaufte",ar:"يشتري",type:"schwach",rule:"Stamm + te"},
  {inf:"leben",prt:"lebte",ar:"يعيش",type:"schwach",rule:"Stamm + te"},
  {inf:"spielen",prt:"spielte",ar:"يلعب",type:"schwach",rule:"Stamm + te"},
  {inf:"hören",prt:"hörte",ar:"يسمع",type:"schwach",rule:"Stamm + te"},
  {inf:"suchen",prt:"suchte",ar:"يبحث",type:"schwach",rule:"Stamm + te"},
  {inf:"arbeiten",prt:"arbeitete",ar:"يعمل",type:"schwach",rule:"Stamm endet -t → + ete"},
  {inf:"warten",prt:"wartete",ar:"ينتظر",type:"schwach",rule:"Stamm endet -t → + ete"},
  {inf:"kosten",prt:"kostete",ar:"يكلف / ثمنه",type:"schwach",rule:"Stamm endet -t → + ete"},
  {inf:"antworten",prt:"antwortete",ar:"يجيب",type:"schwach",rule:"Stamm endet -t → + ete"},
  {inf:"studieren",prt:"studierte",ar:"يدرس في الجامعة",type:"schwach",rule:"-ieren → ierte"},
  {inf:"interessieren",prt:"interessierte",ar:"يهتم",type:"schwach",rule:"-ieren → ierte"},
  {inf:"diskutieren",prt:"diskutierte",ar:"يناقش",type:"schwach",rule:"-ieren → ierte"},
  {inf:"telefonieren",prt:"telefonierte",ar:"يتصل هاتفياً",type:"schwach",rule:"-ieren → ierte"},
  {inf:"trinken",prt:"trank",ar:"يشرب",type:"stark",rule:"i → a"},
  {inf:"finden",prt:"fand",ar:"يجد",type:"stark",rule:"i → a"},
  {inf:"singen",prt:"sang",ar:"يغني",type:"stark",rule:"i → a"},
  {inf:"schreiben",prt:"schrieb",ar:"يكتب",type:"stark",rule:"ei → ie"},
  {inf:"bleiben",prt:"blieb",ar:"يبقى",type:"stark",rule:"ei → ie"},
  {inf:"leihen",prt:"lieh",ar:"يعير / يقرض",type:"stark",rule:"ei → ie"},
  {inf:"geben",prt:"gab",ar:"يعطي",type:"stark",rule:"e → a"},
  {inf:"essen",prt:"aß",ar:"يأكل",type:"stark",rule:"e → a"},
  {inf:"nehmen",prt:"nahm",ar:"يأخذ",type:"stark",rule:"e → a"},
  {inf:"sprechen",prt:"sprach",ar:"يتكلم",type:"stark",rule:"e → a"},
  {inf:"lesen",prt:"las",ar:"يقرأ",type:"stark",rule:"e → a"},
  {inf:"verlieren",prt:"verlor",ar:"يخسر / يضيع",type:"stark",rule:"ie → o"},
  {inf:"fliegen",prt:"flog",ar:"يطير / يسافر",type:"stark",rule:"ie → o"},
  {inf:"kommen",prt:"kam",ar:"يأتي",type:"stark",rule:"o → a"},
  {inf:"laufen",prt:"lief",ar:"يجري / يمشي بسرعة",type:"stark",rule:"au → ie"},
  {inf:"schlafen",prt:"schlief",ar:"ينام",type:"stark",rule:"a → ie"},
  {inf:"gehen",prt:"ging",ar:"يذهب",type:"stark",rule:"unregelmäßig"},
  {inf:"nehmen",prt:"nahm",ar:"يأخذ",type:"stark",rule:"e → a"},
  {inf:"anrufen",prt:"rief an",ar:"يتصل",type:"trennbar",rule:"ei → ie (trennbar)"},
  {inf:"einladen",prt:"lud ein",ar:"يدعو",type:"trennbar",rule:"a → u (trennbar)"},
  {inf:"aufstehen",prt:"stand auf",ar:"يستيقظ / ينهض",type:"trennbar",rule:"unregelmäßig (trennbar)"},
  {inf:"einsteigen",prt:"stieg ein",ar:"يصعد",type:"trennbar",rule:"ei → ie (trennbar)"},
  {inf:"aussteigen",prt:"stieg aus",ar:"ينزل",type:"trennbar",rule:"ei → ie (trennbar)"},
  {inf:"umziehen",prt:"zog um",ar:"ينتقل للسكن",type:"trennbar",rule:"ie → o (trennbar)"},
];
// deduplicate
const seen=new Set();
const ALL=PRAET.filter(x=>{const k=x.inf+x.prt;if(seen.has(k))return false;seen.add(k);return true;});

const BADGE={schwach:"badge-sw",stark:"badge-st",trennbar:"badge-tr"};
let deck=[],idx=0,correct=0,wrong=0,flipped=false,filter='all';

function setFilter(f,btn){filter=f;document.querySelectorAll('.fb').forEach(b=>b.classList.remove('active'));btn.classList.add('active');resetDeck();}
function resetDeck(){
  deck=ALL.filter(x=>filter==='all'||x.type===filter).sort(()=>Math.random()-.5);
  idx=0;correct=0;wrong=0;flipped=false;
  document.getElementById('card').classList.remove('flipped');
  document.getElementById('btns').style.display='none';
  document.getElementById('flipbtn').style.display='';
  updateStats();showCard();
}
function showCard(){
  if(idx>=deck.length){showDone();return;}
  const c=deck[idx];
  document.getElementById('f-inf').textContent=c.inf;
  document.getElementById('f-ar').textContent=c.ar;
  document.getElementById('b-inf').textContent=c.inf;
  document.getElementById('b-prt').textContent=c.prt;
  document.getElementById('b-prt').className='prt-badge '+BADGE[c.type];
  document.getElementById('b-rule').textContent=c.rule;
  document.getElementById('b-ar').textContent=c.ar;
  const total=deck.length;
  document.getElementById('counter').textContent=(idx+1)+' / '+total;
  document.getElementById('prog-lbl').textContent=Math.round(idx/total*100)+'%';
  document.getElementById('prog-done').textContent=idx+' fertig';
  document.getElementById('prog').style.width=(idx/total*100)+'%';
  flipped=false;
  document.getElementById('card').classList.remove('flipped');
  document.getElementById('btns').style.display='none';
  document.getElementById('flipbtn').style.display='';
}
function flipCard(){if(flipped)return;flipped=true;document.getElementById('card').classList.add('flipped');setTimeout(()=>{document.getElementById('btns').style.display='';document.getElementById('flipbtn').style.display='none';},250);}
function answer(ok){if(ok)correct++;else{wrong++;deck.push(deck[idx]);}idx++;updateStats();showCard();}
function updateStats(){document.getElementById('s-c').textContent=correct;document.getElementById('s-w').textContent=wrong;document.getElementById('s-l').textContent=Math.max(0,deck.length-idx);}
function showDone(){const pct=Math.round(correct/(correct+wrong)*100)||0;document.getElementById('card-area').innerHTML=`<div class="done"><div style="font-size:48px">${pct>=80?'🎉':pct>=50?'💪':'📚'}</div><h2>Geschafft!</h2><p style="color:var(--muted);font-size:14px">${correct} gewusst · ${wrong} nochmal · ${pct}%</p><button class="restart" onclick="location.reload()">Nochmal ↺</button></div>`;}
resetDeck();
</script>
</body>
</html>
