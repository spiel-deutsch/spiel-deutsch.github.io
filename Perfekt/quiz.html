<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Perfekt — haben oder sein?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F4EF;--surface:#fff;--text:#1C1917;--muted:#78716C;--hint:#A8A29E;
  --h:#7C3AED;--hl:#EDE9FE;--ht:#5B21B6;--hb:#C4B5FD;
  --s:#0891B2;--sl:#E0F2FE;--st:#0C4A6E;--sb:#7DD3FC;
  --green:#1D9E75;--greenl:#E1F5EE;--greent:#0F6E56;
  --red:#D85A30;--redl:#FAECE7;--redt:#7C2D12;
  --amber:#B45309;--amberl:#FEF3C7;
  --border:rgba(28,25,23,0.1);--bm:rgba(28,25,23,0.15);
  --r:16px;--rs:12px;--sh:0 2px 12px rgba(28,25,23,0.07);--shc:0 8px 32px rgba(28,25,23,0.12)
}
html,body{min-height:100%;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);-webkit-font-smoothing:antialiased}
body{display:flex;flex-direction:column;align-items:center;padding-bottom:32px}
.hdr{width:100%;max-width:560px;padding:20px 20px 0}
.title{font-family:'DM Serif Display',serif;font-size:clamp(18px,5vw,24px)}
.subtitle{font-size:12px;color:var(--muted);margin-top:3px}
.prog-wrap{width:100%;max-width:560px;padding:12px 20px 0}
.prog-meta{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:6px}
.prog-bar{height:4px;background:var(--border);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;border-radius:4px;transition:width .4s,background .3s;background:var(--h)}
.scores{width:100%;max-width:560px;padding:10px 20px 0;display:flex;gap:10px}
.sc{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:10px 8px;text-align:center;box-shadow:var(--sh)}
.sc-n{font-family:'DM Serif Display',serif;font-size:22px;line-height:1}
.sc-l{font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--hint);margin-top:3px}

/* Question card */
.qwrap{width:100%;max-width:560px;padding:12px 20px 0}
.qcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shc);padding:clamp(18px,5vw,26px) 22px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:10px;min-height:200px;justify-content:center;position:relative;overflow:hidden}
.qcard::after{content:'';position:absolute;inset:0;border-radius:var(--r);opacity:0;pointer-events:none}
.qcard.fok::after{background:var(--greenl);animation:fl .35s ease forwards}
.qcard.fno::after{background:var(--redl);animation:fl .35s ease forwards}
@keyframes fl{0%{opacity:.7}100%{opacity:0}}
.qcard.shake{animation:sk .4s cubic-bezier(.36,.07,.19,.97)}
@keyframes sk{10%,90%{transform:translateX(-3px)}20%,80%{transform:translateX(4px)}30%,50%,70%{transform:translateX(-5px)}40%,60%{transform:translateX(5px)}}

.q-label{font-size:10px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--hint)}
/* The full sentence with a blank for haben/sein */
.q-sentence{font-family:'DM Serif Display',serif;font-size:clamp(18px,5vw,26px);color:var(--text);line-height:1.5;display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:6px}
.q-subj{color:var(--muted)}
.q-blank{display:inline-block;min-width:80px;border-bottom:3px solid var(--h);text-align:center;font-size:clamp(18px,5vw,26px);padding:0 6px;color:var(--ht);transition:all .2s}
.q-blank.filled-h{border-radius:6px;padding:2px 10px;background:var(--hl);border-color:var(--h);color:var(--ht)}
.q-blank.filled-s{border-radius:6px;padding:2px 10px;background:var(--sl);border-color:var(--s);color:var(--st)}
.q-blank.filled-no{border-radius:6px;padding:2px 10px;background:var(--redl);border-color:var(--red);color:var(--redt)}
.q-part{font-family:'DM Serif Display',serif;font-size:clamp(18px,5vw,26px);color:var(--greent);font-weight:400}
.q-dot{color:var(--hint)}
/* Arabic + verb info */
.q-info{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:center}
.q-ar{font-size:13px;color:var(--muted);direction:rtl}
.q-verb-chip{font-size:12px;font-weight:600;padding:2px 9px;border-radius:20px;background:var(--bg);border:1px solid var(--border);color:var(--muted)}

/* Two big buttons */
.choice-btns{width:100%;max-width:560px;padding:12px 20px 0;display:grid;grid-template-columns:1fr 1fr;gap:14px}
.choice{border-radius:var(--r);border:2px solid;padding:clamp(18px,5vw,24px) 16px;font-family:'DM Serif Display',serif;font-size:clamp(24px,7vw,36px);cursor:pointer;text-align:center;transition:all .15s;box-shadow:var(--sh);-webkit-tap-highlight-color:transparent;display:flex;flex-direction:column;align-items:center;gap:4px}
.choice:active:not([disabled]){transform:scale(.96)}
.choice.haben{background:var(--hl);border-color:var(--hb);color:var(--ht)}
.choice.sein{background:var(--sl);border-color:var(--sb);color:var(--st)}
.choice.correct-h{background:var(--hl);border-color:var(--h);color:var(--ht);box-shadow:0 0 0 3px var(--h)}
.choice.correct-s{background:var(--sl);border-color:var(--s);color:var(--st);box-shadow:0 0 0 3px var(--s)}
.choice.wrong-pick{background:var(--redl);border-color:var(--red);color:var(--redt)}
.choice.dim{opacity:.35}
.choice[disabled]{cursor:default}
.choice-sub{font-size:12px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;opacity:.7}

/* Rule hint shown after wrong */
.rule-hint{width:100%;max-width:560px;padding:0 20px;min-height:36px}
.rh-box{background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);padding:10px 16px;font-size:13px;color:var(--muted);line-height:1.5}
.rh-box strong{color:var(--text);font-weight:600}

.fbrow{width:100%;max-width:560px;padding:8px 20px 0;display:flex;align-items:center;justify-content:space-between;gap:12px;min-height:48px}
.fbmsg{font-size:14px;font-weight:500;color:var(--muted);flex:1;line-height:1.5}
.fbmsg.ok{color:var(--greent)}
.fbmsg.no{color:var(--redt)}
.nxt{padding:10px 22px;border-radius:var(--rs);background:var(--text);color:var(--bg);border:none;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;white-space:nowrap}

/* Done */
.done-scr{width:100%;max-width:560px;padding:40px 20px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:12px}
.done-scr h2{font-family:'DM Serif Display',serif;font-size:30px}
.dgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;margin-top:8px}
.dg{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:14px 8px;text-align:center;box-shadow:var(--sh)}
.dg-n{font-family:'DM Serif Display',serif;font-size:26px;line-height:1}
.dg-l{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--hint);margin-top:4px}
.restart{padding:13px 32px;border-radius:var(--rs);background:var(--text);color:var(--bg);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;border:none;cursor:pointer;margin-top:4px}
.footer{padding:20px 0 8px;font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--hint);text-align:center;width:100%}
</style>
</head>
<body>
<div class="hdr">
  <div class="title">haben oder sein?</div>
  <div class="subtitle">Perfekt — wähle das richtige Hilfsverb</div>
</div>
<div class="prog-wrap">
  <div class="prog-meta"><span id="counter">Frage 1 / 85</span><span id="pct">0%</span></div>
  <div class="prog-bar"><div class="prog-fill" id="prog" style="width:0%"></div></div>
</div>
<div class="scores">
  <div class="sc"><div class="sc-n" id="sc-c" style="color:var(--green)">0</div><div class="sc-l">Richtig</div></div>
  <div class="sc"><div class="sc-n" id="sc-w" style="color:var(--red)">0</div><div class="sc-l">Falsch</div></div>
  <div class="sc"><div class="sc-n" id="sc-s" style="color:var(--amber)">0</div><div class="sc-l">Streak</div></div>
</div>
<div class="qwrap">
  <div class="qcard" id="qcard">
    <div class="q-label">Welches Hilfsverb?</div>

    <div class="q-info">
      <span class="q-verb-chip" id="q-type"></span>
      <span class="q-ar" id="q-ar"></span>
    </div>
  </div>
</div>
<div class="choice-btns">
  <button class="choice haben" id="btn-haben" onclick="pick('haben')" aria-label="haben">
    haben
    <span class="choice-sub">habe · hast · hat...</span>
  </button>
  <button class="choice sein" id="btn-sein" onclick="pick('sein')" aria-label="sein">
    sein
    <span class="choice-sub">bin · bist · ist...</span>
  </button>
</div>
<div class="rule-hint" id="rule-hint"></div>
<div class="fbrow" id="fbrow"><div class="fbmsg" id="fbmsg"></div></div>
<div class="footer">by ❤️ Mostafa Toumi</div>

<script>

const SUBJS=["Ich","Du","Er","Sie","Wir","Ihr","Sie (formell)"];
const CONJ={haben:{Ich:"habe",Du:"hast",Er:"hat",Sie:"hat",Wir:"haben",Ihr:"habt","Sie (formell)":"haben"},
            sein: {Ich:"bin", Du:"bist",Er:"ist", Sie:"ist", Wir:"sind", Ihr:"seid","Sie (formell)":"sind"}};

function shuffle(a){return[...a].sort(()=>Math.random()-.5)}
let qs=[],qi=0,correct=0,wrong=0,streak=0,answered=false;
let curSubj='Ich';

function init(){qs=shuffle(ALL);qi=0;correct=0;wrong=0;streak=0;answered=false;showQ();}

function showQ(){
  if(qi>=qs.length){showDone();return;}
  answered=false;
  const q=qs[qi];
  curSubj=SUBJS[Math.floor(Math.random()*SUBJS.length)];
  document.getElementById('counter').textContent='Frage '+(qi+1)+' / '+qs.length;
  document.getElementById('pct').textContent=Math.round(qi/qs.length*100)+'%';
  document.getElementById('prog').style.width=(qi/qs.length*100)+'%';
  document.getElementById('fbmsg').textContent='';
  document.getElementById('fbmsg').className='fbmsg';
  document.getElementById('rule-hint').innerHTML='';
  const oldnxt=document.getElementById('nxt-btn');if(oldnxt)oldnxt.remove();
  document.getElementById('btn-haben').disabled=false;
  document.getElementById('btn-sein').disabled=false;
  document.getElementById('btn-haben').className='choice haben';
  document.getElementById('btn-sein').className='choice sein';

  // Build sentence: Subj + [BLANK] + Partizip II + .
  const sent=document.getElementById('qsentence');sent.innerHTML='';
  const addS=(txt,cls='')=>{const s=document.createElement('span');s.textContent=txt;if(cls)s.className=cls;sent.appendChild(s);};
  addS(curSubj+' ','q-subj');
  const blank=document.createElement('span');blank.id='q-blank';blank.className='q-blank';blank.textContent='___';sent.appendChild(blank);
  addS(' ');addS(q.p2,'q-part');addS('.','q-dot');

  document.getElementById('q-ar').textContent=q.ar;
  document.getElementById('q-type').textContent=q.t;
}

function pick(h){
  if(answered)return;answered=true;
  const q=qs[qi];
  const ok=h===q.h;
  const conj=CONJ[q.h][curSubj];
  const blank=document.getElementById('q-blank');
  blank.textContent=conj;
  blank.className='q-blank '+(ok?(q.h==='haben'?'filled-h':'filled-s'):'filled-no');

  const bh=document.getElementById('btn-haben');
  const bs=document.getElementById('btn-sein');
  bh.disabled=true;bs.disabled=true;

  if(ok){
    correct++;streak++;
    if(q.h==='haben'){bh.className='choice correct-h';bs.className='choice dim';}
    else{bs.className='choice correct-s';bh.className='choice dim';}
    document.getElementById('fbmsg').textContent='✓ Richtig!'+(streak>=3?' 🔥 '+streak+'er Streak!':'');
    document.getElementById('fbmsg').className='fbmsg ok';
    const qcard=document.getElementById('qcard');
    qcard.classList.add('fok');setTimeout(()=>qcard.classList.remove('fok'),350);
  } else {
    wrong++;streak=0;
    if(q.h==='haben'){bh.className='choice correct-h';bs.className='choice wrong-pick';}
    else{bs.className='choice correct-s';bh.className='choice wrong-pick';}
    blank.textContent=CONJ[q.h][curSubj];
    blank.className='q-blank '+(q.h==='haben'?'filled-h':'filled-s');
    document.getElementById('fbmsg').textContent='✗ Es ist '+q.h+'!';
    document.getElementById('fbmsg').className='fbmsg no';
    document.getElementById('rule-hint').innerHTML=`<div class="rh-box"><strong>Regel:</strong> ${q.hint}</div>`;
    const qcard=document.getElementById('qcard');
    qcard.classList.add('fno','shake');setTimeout(()=>qcard.classList.remove('fno','shake'),400);
  }
  document.getElementById('sc-c').textContent=correct;
  document.getElementById('sc-w').textContent=wrong;
  document.getElementById('sc-s').textContent=streak;
  const nb=document.createElement('button');nb.className='nxt';nb.id='nxt-btn';
  nb.textContent=qi+1<qs.length?'Weiter →':'Ergebnis →';
  nb.onclick=()=>{qi++;showQ();};
  document.getElementById('fbrow').appendChild(nb);
}

function showDone(){
  const total=correct+wrong,pct=Math.round(correct/total*100)||0;
  document.querySelector('.qwrap').style.display='none';
  document.querySelector('.choice-btns').style.display='none';
  document.getElementById('fbrow').style.display='none';
  document.getElementById('rule-hint').style.display='none';
  const d=document.createElement('div');d.className='done-scr';
  d.innerHTML=`<div style="font-size:52px">${pct>=90?'🏆':pct>=70?'🎉':pct>=50?'💪':'📚'}</div>
  <h2>Quiz beendet!</h2>
  <div style="font-family:'DM Serif Display',serif;font-size:60px;line-height:1">${pct}%</div>
  <div class="dgrid">
    <div class="dg"><div class="dg-n" style="color:var(--green)">${correct}</div><div class="dg-l">Richtig</div></div>
    <div class="dg"><div class="dg-n" style="color:var(--red)">${wrong}</div><div class="dg-l">Falsch</div></div>
    <div class="dg"><div class="dg-n">${total}</div><div class="dg-l">Gesamt</div></div>
  </div>
  <button class="restart" onclick="location.reload()">Nochmal ↺</button>`;
  document.querySelector('.footer').before(d);
}
init();
</script>
</body>
</html>
