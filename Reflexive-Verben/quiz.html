<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Reflexive Verben — Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F4EF;--surface:#fff;--text:#1C1917;--muted:#78716C;--hint:#A8A29E;
  --c:#0891B2;--cl:#E0F2FE;--ct:#0C4A6E;--cb:#7DD3FC;
  --pr:#1D9E75;--prl:#E1F5EE;--prt:#0F6E56;
  --red:#D85A30;--redl:#FAECE7;--redt:#993C1D;
  --amber:#B45309;--amberl:#FEF3C7;
  --border:rgba(28,25,23,0.1);--bm:rgba(28,25,23,0.15);
  --r:16px;--rs:12px;--sh:0 2px 12px rgba(28,25,23,0.07);--shc:0 8px 32px rgba(28,25,23,0.12)
}
html,body{min-height:100%;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);-webkit-font-smoothing:antialiased}
body{display:flex;flex-direction:column;align-items:center;padding-bottom:32px}
.hdr{width:100%;max-width:540px;padding:20px 20px 0}
.title{font-family:'DM Serif Display',serif;font-size:clamp(18px,5vw,24px)}
.subtitle{font-size:12px;color:var(--muted);margin-top:3px}
.prog-wrap{width:100%;max-width:540px;padding:12px 20px 0}
.prog-meta{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:6px}
.prog-bar{height:4px;background:var(--border);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;background:var(--c);border-radius:4px;transition:width .4s}
.scores{width:100%;max-width:540px;padding:10px 20px 0;display:flex;gap:10px}
.sc{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:10px 8px;text-align:center;box-shadow:var(--sh)}
.sc-n{font-family:'DM Serif Display',serif;font-size:22px;line-height:1}
.sc-l{font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--hint);margin-top:3px}
/* Question card */
.qwrap{width:100%;max-width:540px;padding:12px 20px 0}
.qcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shc);padding:clamp(18px,5vw,26px) 22px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:7px;min-height:180px;justify-content:center;position:relative;overflow:hidden}
.qcard::after{content:'';position:absolute;inset:0;border-radius:var(--r);opacity:0;pointer-events:none}
.qcard.fok::after{background:var(--prl);animation:fl .35s ease forwards}
.qcard.fno::after{background:var(--redl);animation:fl .35s ease forwards}
@keyframes fl{0%{opacity:.7}100%{opacity:0}}
.qcard.shake{animation:sk .4s cubic-bezier(.36,.07,.19,.97)}
@keyframes sk{10%,90%{transform:translateX(-3px)}20%,80%{transform:translateX(4px)}30%,50%,70%{transform:translateX(-5px)}40%,60%{transform:translateX(5px)}}
.q-label{font-size:10px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--hint)}
/* Sentence display with blank */
.q-sentence{font-family:'DM Serif Display',serif;font-size:clamp(18px,5vw,26px);color:var(--text);line-height:1.4;display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:6px}
.q-blank{display:inline-block;min-width:70px;border-bottom:3px solid var(--c);text-align:center;color:var(--c);font-size:clamp(18px,5vw,26px);padding:0 4px;transition:all .2s}
.q-blank.filled-ok{border-color:var(--pr);color:var(--prt);background:var(--prl);border-radius:6px;padding:0 8px}
.q-blank.filled-no{border-color:var(--red);color:var(--redt);background:var(--redl);border-radius:6px;padding:0 8px}
.q-ar{font-size:13px;color:var(--muted);direction:rtl;margin-top:4px}
.q-subhint{font-size:12px;color:var(--hint);font-style:italic}
/* Options — 3x2 grid of pronouns */
.opts{width:100%;max-width:540px;padding:12px 20px 0;display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.opt{background:var(--surface);border:1.5px solid var(--bm);border-radius:var(--rs);padding:clamp(14px,4vw,18px) 8px;font-family:'DM Serif Display',serif;font-size:clamp(16px,4.5vw,22px);color:var(--text);cursor:pointer;text-align:center;transition:all .12s;box-shadow:var(--sh);-webkit-tap-highlight-color:transparent}
.opt:active:not([disabled]){transform:scale(.96)}
.opt.ok{background:var(--prl);border-color:var(--pr);color:var(--prt)}
.opt.no{background:var(--redl);border-color:var(--red);color:var(--redt)}
.opt.dim{opacity:.3}
.opt[disabled]{cursor:default}
/* Feedback */
.fbrow{width:100%;max-width:540px;padding:12px 20px 0;display:flex;align-items:center;justify-content:space-between;gap:12px;min-height:48px}
.fbmsg{font-size:14px;font-weight:500;color:var(--muted);flex:1;line-height:1.5}
.fbmsg.ok{color:var(--prt)}
.fbmsg.no{color:var(--redt)}
.nxt{padding:10px 22px;border-radius:var(--rs);background:var(--text);color:var(--bg);border:none;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent}
/* Done */
.done-scr{width:100%;max-width:540px;padding:40px 20px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:12px}
.done-scr h2{font-family:'DM Serif Display',serif;font-size:30px}
.dgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;margin-top:8px}
.dg{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:14px 8px;text-align:center;box-shadow:var(--sh)}
.dg-n{font-family:'DM Serif Display',serif;font-size:26px;line-height:1}
.dg-l{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--hint);margin-top:4px}
.restart{padding:13px 32px;border-radius:var(--rs);background:var(--text);color:var(--bg);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;border:none;cursor:pointer;margin-top:4px}
.footer{padding:20px 0 8px;font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--hint);text-align:center;width:100%}
</style>
</head>
<body>
<div class="hdr">
  <div class="title">Reflexive Verben — Quiz</div>
  <div class="subtitle">Welches Reflexivpronomen passt?</div>
</div>
<div class="prog-wrap">
  <div class="prog-meta"><span id="counter">Frage 1 / 50</span><span id="pct">0%</span></div>
  <div class="prog-bar"><div class="prog-fill" id="prog" style="width:0%"></div></div>
</div>
<div class="scores">
  <div class="sc"><div class="sc-n" id="sc-c" style="color:var(--pr)">0</div><div class="sc-l">Richtig</div></div>
  <div class="sc"><div class="sc-n" id="sc-w" style="color:var(--red)">0</div><div class="sc-l">Falsch</div></div>
  <div class="sc"><div class="sc-n" id="sc-s" style="color:var(--amber)">0</div><div class="sc-l">Streak</div></div>
</div>
<div class="qwrap">
  <div class="qcard" id="qcard">
    <div class="q-label">Ergänze das Reflexivpronomen</div>
    <div class="q-sentence" id="qsentence"></div>
    <div class="q-ar" id="qar"></div>
    <div class="q-subhint" id="qhint"></div>
  </div>
</div>
<!-- Pronoun grid — always show all 6 pronouns as choices -->
<div class="opts" id="opts">
  <button class="opt" onclick="pick(this,'mich')">mich</button>
  <button class="opt" onclick="pick(this,'dich')">dich</button>
  <button class="opt" onclick="pick(this,'sich')">sich</button>
  <button class="opt" onclick="pick(this,'uns')">uns</button>
  <button class="opt" onclick="pick(this,'euch')">euch</button>
  <button class="opt" onclick="pick(this,'mir')">mir</button>
</div>
<div class="fbrow" id="fbrow"><div class="fbmsg" id="fbmsg"></div></div>
<div class="footer">by Mostafa Toumi</div>
<script>
// Each question uses a specific person so students must choose the right pronoun
// persons cycle: ich(mich/mir), du(dich), er(sich), wir(uns), ihr(euch), sie(sich)
const PERSONS=[
  {subj:"Ich",pron_akk:"mich",pron_dat:"mir"},
  {subj:"Du",pron_akk:"dich",pron_dat:"dir"},
  {subj:"Er",pron_akk:"sich",pron_dat:"sich"},
  {subj:"Wir",pron_akk:"uns",pron_dat:"uns"},
  {subj:"Ihr",pron_akk:"euch",pron_dat:"euch"},
  {subj:"Sie",pron_akk:"sich",pron_dat:"sich"},
];

const VERBS=[
  {v:"ärgert",prep:"über den Lärm",ar:"يغضب من الضجيج",type:"akk"},
  {v:"freut",prep:"auf den Urlaub",ar:"يتطلع إلى الإجازة",type:"akk"},
  {v:"beeilt",prep:"",ar:"يستعجل",type:"akk"},
  {v:"fühlt",prep:"gut",ar:"يشعر بشكل جيد",type:"akk"},
  {v:"setzt",prep:"hin",ar:"يجلس",type:"akk"},
  {v:"wäscht",prep:"morgens",ar:"يغسل نفسه",type:"akk"},
  {v:"erinnert",prep:"an den Termin",ar:"يتذكر الموعد",type:"akk"},
  {v:"erholt",prep:"am Wochenende",ar:"يستريح في عطلة نهاية الأسبوع",type:"akk"},
  {v:"interessiert",prep:"für Musik",ar:"يهتم بالموسيقى",type:"akk"},
  {v:"meldet",prep:"an",ar:"يسجل",type:"akk"},
  {v:"zieht",prep:"an",ar:"يرتدي ملابسه",type:"akk"},
  {v:"ruht",prep:"aus",ar:"يستريح",type:"akk"},
  {v:"stellt",prep:"vor",ar:"يعرّف بنفسه",type:"akk"},
  {v:"verletzt",prep:"beim Sport",ar:"يصاب في الرياضة",type:"akk"},
  {v:"beschwert",prep:"über den Service",ar:"يشتكي من الخدمة",type:"akk"},
  {v:"bewegt",prep:"jeden Tag",ar:"يتحرك كل يوم",type:"akk"},
  {v:"ducht",prep:"morgens",ar:"يستحم صباحاً",type:"akk"},
  {v:"entscheidet",prep:"für Deutsch",ar:"يختار اللغة الألمانية",type:"akk"},
  {v:"erkältet",prep:"im Winter",ar:"يصاب بالزكام في الشتاء",type:"akk"},
  {v:"sorgt",prep:"um das Kind",ar:"يقلق على الطفل",type:"akk"},
  {v:"kümmert",prep:"um das Kind",ar:"يعتني بالطفل",type:"akk"},
  {v:"wünscht",prep:"etwas",ar:"يتمنى شيئاً",type:"dat"},
  {v:"wäscht",prep:"die Hände",ar:"يغسل يديه",type:"dat"},
  {v:"kauft",prep:"ein Buch",ar:"يشتري كتاباً لنفسه",type:"dat"},
  {v:"zieht",prep:"etwas",ar:"يتخيل شيئاً",type:"dat"},
  {v:"trifft",prep:"mit Freunden",ar:"يلتقي بأصدقاء",type:"akk"},
  {v:"unterhält",prep:"mit ihr",ar:"يتحدث معها",type:"akk"},
  {v:"verabschiedet",prep:"von den Freunden",ar:"يودع الأصدقاء",type:"akk"},
  {v:"konzentriert",prep:"auf die Arbeit",ar:"يركز على العمل",type:"akk"},
  {v:"gewöhnt",prep:"an das Wetter",ar:"يعتاد على الطقس",type:"akk"},
  {v:"schämt",prep:"für seinen Fehler",ar:"يخجل من خطئه",type:"akk"},
  {v:"verlässt",prep:"auf dich",ar:"يعتمد عليك",type:"akk"},
  {v:"wundert",prep:"über die Nachricht",ar:"يتعجب من الخبر",type:"akk"},
  {v:"bemüht",prep:"sehr",ar:"يبذل جهداً كبيراً",type:"akk"},
  {v:"befindet",prep:"in Berlin",ar:"يتواجد في برلين",type:"akk"},
  {v:"entwickelt",prep:"weiter",ar:"يتطور",type:"akk"},
  {v:"verlaufen",prep:"in der Stadt",ar:"يضيع في المدينة",type:"akk"},
  {v:"bedankt",prep:"bei dir",ar:"يشكرك",type:"akk"},
  {v:"entschuldigt",prep:"bei ihr",ar:"يعتذر منها",type:"akk"},
  {v:"trennt",prep:"von ihr",ar:"ينفصل عنها",type:"akk"},
  {v:"nähert",prep:"dem Ziel",ar:"يقترب من الهدف",type:"akk"},
  {v:"zieht",prep:"um",ar:"ينتقل للسكن",type:"akk"},
  {v:"legt",prep:"hin",ar:"يستلقي",type:"akk"},
  {v:"bereitet",prep:"auf die Prüfung vor",ar:"يستعد للامتحان",type:"akk"},
  {v:"streitet",prep:"mit ihm",ar:"يتشاجر معه",type:"akk"},
  {v:"zeigt",prep:"",ar:"يظهر",type:"akk"},
  {v:"erklärt",prep:"",ar:"يوضح نفسه",type:"akk"},
  {v:"erinnert",prep:"an früher",ar:"يتذكر الماضي",type:"akk"},
  {v:"vorbereitet",prep:"gut",ar:"يستعد جيداً",type:"akk"},
  {v:"rasiert",prep:"täglich",ar:"يحلق يومياً",type:"akk"},
];

function shuffle(a){return[...a].sort(()=>Math.random()-.5)}
let qs=[],qi=0,correct=0,wrong=0,streak=0,answered=false;

function buildQuestions(){
  // Each verb gets a random person
  qs=shuffle(VERBS).map((verb,i)=>{
    const person=PERSONS[i%PERSONS.length];
    const correctPron=verb.type==='dat'?person.pron_dat:person.pron_akk;
    return{subj:person.subj,verb:verb.v,prep:verb.prep,ar:verb.ar,correct:correctPron,type:verb.type};
  });
  qi=0;correct=0;wrong=0;streak=0;answered=false;
}

function showQ(){
  if(qi>=qs.length){showDone();return;}
  answered=false;
  const q=qs[qi];
  document.getElementById('counter').textContent='Frage '+(qi+1)+' / '+qs.length;
  document.getElementById('pct').textContent=Math.round(qi/qs.length*100)+'%';
  document.getElementById('prog').style.width=(qi/qs.length*100)+'%';
  document.getElementById('fbmsg').textContent='';
  document.getElementById('fbmsg').className='fbmsg';
  const oldnxt=document.getElementById('nxt-btn');if(oldnxt)oldnxt.remove();

  // Build sentence: "Subj verb [___] prep."
  const sent=document.getElementById('qsentence');
  sent.innerHTML='';
  const addSpan=(txt,cls='')=>{const s=document.createElement('span');s.textContent=txt;if(cls)s.className=cls;sent.appendChild(s);};
  addSpan(q.subj+' '+q.verb+' ');
  const blank=document.createElement('span');blank.className='q-blank';blank.id='q-blank';blank.textContent='___';sent.appendChild(blank);
  if(q.prep){addSpan(' '+q.prep);}
  addSpan('.');

  document.getElementById('qar').textContent=q.ar;
  document.getElementById('qhint').textContent=q.type==='dat'?'Tipp: Dativ (anderes Objekt im Satz)':'';

  // Reset all option buttons
  document.querySelectorAll('.opt').forEach(b=>{
    b.disabled=false;
    b.className='opt';
  });
}

function pick(btn,val){
  if(answered)return;
  answered=true;
  const q=qs[qi];
  const ok=val===q.correct;
  const blank=document.getElementById('q-blank');
  blank.textContent=val;
  blank.classList.add(ok?'filled-ok':'filled-no');
  document.querySelectorAll('.opt').forEach(b=>{
    b.disabled=true;
    if(b.textContent===q.correct)b.classList.add('ok');
    else if(b===btn&&!ok)b.classList.add('no');
    else b.classList.add('dim');
  });
  const qcard=document.getElementById('qcard');
  const fb=document.getElementById('fbmsg');
  if(ok){
    correct++;streak++;
    fb.textContent='✓ Richtig!'+(streak>=3?' 🔥 '+streak+'er Streak!':'');
    fb.className='fbmsg ok';
    qcard.classList.add('fok');setTimeout(()=>qcard.classList.remove('fok'),350);
  } else {
    wrong++;streak=0;
    fb.textContent='✗ Richtig wäre: '+q.correct;
    fb.className='fbmsg no';
    qcard.classList.add('fno','shake');setTimeout(()=>qcard.classList.remove('fno','shake'),400);
  }
  document.getElementById('sc-c').textContent=correct;
  document.getElementById('sc-w').textContent=wrong;
  document.getElementById('sc-s').textContent=streak;
  const nb=document.createElement('button');nb.className='nxt';nb.id='nxt-btn';
  nb.textContent=qi+1<qs.length?'Weiter →':'Ergebnis →';
  nb.onclick=()=>{qi++;showQ();};
  document.getElementById('fbrow').appendChild(nb);
}

function showDone(){
  const total=correct+wrong,pct=Math.round(correct/total*100)||0;
  document.querySelector('.qwrap').style.display='none';
  document.getElementById('opts').style.display='none';
  document.getElementById('fbrow').style.display='none';
  const d=document.createElement('div');d.className='done-scr';
  d.innerHTML=`<div style="font-size:52px">${pct>=90?'🏆':pct>=70?'🎉':pct>=50?'💪':'📚'}</div>
  <h2>Quiz beendet!</h2>
  <div style="font-family:'DM Serif Display',serif;font-size:60px;line-height:1">${pct}%</div>
  <div class="dgrid">
    <div class="dg"><div class="dg-n" style="color:var(--pr)">${correct}</div><div class="dg-l">Richtig</div></div>
    <div class="dg"><div class="dg-n" style="color:var(--red)">${wrong}</div><div class="dg-l">Falsch</div></div>
    <div class="dg"><div class="dg-n">${total}</div><div class="dg-l">Gesamt</div></div>
  </div>
  <button class="restart" onclick="location.reload()">Nochmal ↺</button>`;
  document.querySelector('.footer').before(d);
}

buildQuestions();
showQ();
</script>
</body>
</html>
